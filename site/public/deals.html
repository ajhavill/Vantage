<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vantage — Deal flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/vantage.css"/>
<style>
  /* ---- Deal-flow specific (reuses vantage.css tokens + topbar/auth/buttons) ---- */
  .crumb b{color:var(--ink-soft)}
  .navlink{font:600 12.5px Inter;color:var(--ink-soft);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .navlink:hover{color:var(--accent)}

  .wrap{max-width:1120px;margin:0 auto;padding:22px}
  .vhead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .vhead h1{font-size:22px}
  .vhead .sub{font-size:12.5px;color:var(--ink-faint);margin-top:3px}

  /* pipeline board */
  .pipe{display:grid;gap:14px;overflow-x:auto;padding-bottom:6px}
  .pcol{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:160px}
  .pcol .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .pcol .ph .t{font:600 11px Inter;text-transform:uppercase;letter-spacing:.11em;color:var(--ink-faint)}
  .pcol .ph .c{font:600 11px 'JetBrains Mono';color:var(--ink-faint);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .dcard{background:var(--paper-2);border:1px solid var(--line-2);border-radius:11px;padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .14s,box-shadow .14s,transform .14s}
  .dcard:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
  .dcard .nm{font:700 14.5px 'Bricolage Grotesque';color:var(--ink);line-height:1.15}
  .dcard .mt{font:500 11.5px Inter;color:var(--ink-faint);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap}
  .dcard .mt b{color:var(--ink-soft);font-weight:600;font-family:'JetBrains Mono'}
  .pcol .empty{font:400 11.5px Inter;color:var(--ink-faint);text-align:center;padding:14px 4px}
  .closedsec{margin-top:20px}
  .closedtog{font:600 12px Inter;color:var(--ink-faint);background:none;border:0;cursor:pointer;padding:6px 0}
  .closedtog:hover{color:var(--ink-soft)}
  .closedlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:8px}

  /* detail */
  .dealhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .dealhead h1{font-size:24px}
  .dealhead .meta{font:500 12.5px Inter;color:var(--ink-faint);margin-top:4px}
  .stagepick{display:flex;align-items:center;gap:8px}
  .stagepick label{font:600 10.5px Inter;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)}

  .sec{margin-top:26px}
  .sec-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .sec-h h2{font:700 15px 'Bricolage Grotesque';color:var(--ink)}
  .sec-h .hint{font:400 11.5px Inter;color:var(--ink-faint)}

  .pcard{border:1px solid var(--line);border-radius:13px;background:var(--paper-2);padding:14px 16px;margin-bottom:12px}
  .pcard .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .pcard .top .nm{font:700 15px 'Bricolage Grotesque';color:var(--ink)}
  .pcard .top .ad{font:500 12px Inter;color:var(--ink-soft);margin-top:2px}
  .tag{font:600 10px Inter;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;border-radius:999px;border:1px solid var(--line-2);color:var(--ink-soft);background:var(--paper);white-space:nowrap}
  .tag.b{background:var(--building);color:#fff;border-color:var(--building)}

  /* rounds table */
  .rounds{margin-top:12px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .rtable{width:100%;border-collapse:collapse;font-size:12.5px}
  .rtable th{font:600 10px Inter;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);text-align:left;padding:8px 10px;background:var(--paper);border-bottom:1px solid var(--line)}
  .rtable td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  .rtable tr:last-child td{border-bottom:0}
  .rtable .num{font-family:'JetBrains Mono';text-align:right;white-space:nowrap}
  .party{font:600 10px Inter;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:6px}
  .party.tenant{background:rgba(45,110,126,.12);color:var(--accent)}
  .party.landlord{background:rgba(201,84,63,.13);color:var(--dining)}
  .draftpill{font:600 9.5px Inter;text-transform:uppercase;letter-spacing:.06em;color:#9a6a00;background:#fbeecb;border-radius:5px;padding:2px 6px;margin-left:6px}
  .ge{font:500 11.5px Inter;color:var(--ink-faint);margin-top:8px}
  .ge b{color:var(--ink-soft);font-family:'JetBrains Mono'}

  .miniadd{font:600 11.5px Inter;color:var(--accent);background:none;border:0;cursor:pointer;padding:6px 0;display:inline-flex;align-items:center;gap:5px}
  .miniadd:hover{text-decoration:underline}

  /* modal */
  .ov{position:fixed;inset:0;z-index:2500;display:none;align-items:flex-start;justify-content:center;background:rgba(20,26,38,.46);backdrop-filter:blur(2px);padding:42px 16px;overflow-y:auto}
  .ov.show{display:flex}
  .sheet{width:min(560px,100%);background:var(--paper-2);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px 24px}
  .sheet h3{font:700 17px 'Bricolage Grotesque';color:var(--ink);margin-bottom:3px}
  .sheet .ssub{font:400 12px Inter;color:var(--ink-faint);margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .fld.full{grid-column:1/-1}
  .fld label{font:600 10.5px Inter;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint)}
  .fld input,.fld select,.fld textarea{font:500 14px Inter;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--paper);color:var(--ink);width:100%}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent)}
  .fld textarea{resize:vertical;min-height:62px}
  .fld .u{font:500 11px Inter;color:var(--ink-faint)}
  .srow{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .btn{font:600 13px Inter;border-radius:9px;padding:10px 16px;cursor:pointer;border:1px solid var(--line-2);background:var(--paper);color:var(--ink-soft)}
  .btn:hover{border-color:var(--ink-faint)}
  .btn.pri{background:var(--building);color:#fff;border-color:var(--building)}
  .btn.pri:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.6;cursor:default}
  .formerr{font:500 12px Inter;color:#C2453F;min-height:15px;margin-top:4px}
  .delx{font:500 11.5px Inter;color:var(--ink-faint);background:none;border:0;cursor:pointer}
  .delx:hover{color:var(--dining)}
  .loading{font:500 13px Inter;color:var(--ink-faint);text-align:center;padding:40px}

  /* share + visibility */
  .dhactions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .vis{font:600 10.5px Inter;border:1px solid var(--line-2);background:var(--paper);color:var(--ink-faint);border-radius:999px;padding:4px 11px;cursor:pointer;white-space:nowrap}
  .vis:hover{border-color:var(--ink-faint)}
  .vis.on{background:rgba(63,143,107,.12);border-color:rgba(63,143,107,.4);color:var(--fitness)}
  .linkbox input{width:100%;font:500 12.5px 'JetBrains Mono';padding:9px 11px;border:1px solid var(--line-2);border-radius:9px;background:var(--paper);color:var(--ink)}
  .docs{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .docrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--paper)}
  .docname{display:inline-flex;align-items:center;gap:7px;font:600 12.5px Inter;color:var(--accent);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .docname:hover{text-decoration:underline}

  /* AI drafting */
  .miniadd.ai{color:#7a5af0}
  .vbtn{font-size:13px;line-height:1;background:none;border:1px solid var(--line-2);border-radius:7px;padding:2px 7px;cursor:pointer;margin-left:6px}
  .vbtn.rec{background:rgba(201,84,63,.15);border-color:var(--dining);animation:vpulse 1s infinite}
  @keyframes vpulse{0%,100%{opacity:1}50%{opacity:.45}}
  .rev{font:600 10.5px Inter;color:var(--accent);background:none;border:0;cursor:pointer;text-decoration:underline;margin-left:6px}
  .draftbox{font:400 13px Inter;color:var(--ink);background:var(--paper);border:1px solid var(--line-2);border-radius:9px;padding:12px 14px;max-height:300px;overflow-y:auto;line-height:1.55}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font:600 13px Inter;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transition:all .3s;z-index:4000;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* tour stops */
  .tcard{border:1px solid var(--line);border-radius:11px;background:var(--paper-2);padding:12px 14px;margin-bottom:10px}
  .tcard .tw{font:600 11.5px Inter;color:var(--accent)}
  .tcard .tn{font:700 14px 'Bricolage Grotesque';color:var(--ink);margin-top:2px}
  .tcard .tnotes{font:400 12px Inter;color:var(--ink-soft);margin-top:4px}
  .tcard .trow{display:flex;gap:9px;align-items:center;margin-top:9px;flex-wrap:wrap}

  /* lease abstract */
  .la-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px 16px;margin-top:12px}
  .la-l{font:600 10px Inter;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin-bottom:2px}
  .la-cell .la-v{font:600 13px Inter;color:var(--ink)}
  .la-opts{margin-top:13px;font:400 12.5px Inter;color:var(--ink-soft);line-height:1.5}
  .la-kd{margin-top:13px}
  .la-kdrow{display:flex;justify-content:space-between;gap:12px;font:500 12.5px Inter;color:var(--ink-soft);padding:5px 0;border-bottom:1px solid var(--line)}
  .la-kdrow b{color:var(--ink);font-family:'JetBrains Mono';font-size:12px}
  .kdrow{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .kdrow .kd-l{flex:1;font:500 13px Inter;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper);color:var(--ink)}
  .kdrow .kd-d{font:500 13px Inter;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper);color:var(--ink)}
  .kdrow .kd-x{font-size:17px;line-height:1;background:none;border:0;color:var(--ink-faint);cursor:pointer;padding:4px 8px}
  .kdrow .kd-x:hover{color:var(--dining)}

  @media (max-width:560px){
    .wrap{padding:16px}
    .grid2{grid-template-columns:1fr}
    .dealhead{flex-direction:column;align-items:flex-start;gap:10px}
    .dhactions{width:100%;flex-wrap:wrap}
  }

  /* side-by-side compare */
  .cmpwrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px;background:var(--paper-2)}
  .cmp{border-collapse:collapse;width:100%;min-width:520px;font-size:12.5px}
  .cmp th,.cmp td{border-bottom:1px solid var(--line);padding:10px 14px;text-align:left;vertical-align:top}
  .cmp tr:last-child td{border-bottom:0}
  .cmp .rl{font:600 10.5px Inter;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);white-space:nowrap;background:var(--paper);position:sticky;left:0;z-index:1}
  .cmp thead th{background:var(--paper);position:sticky;top:0;z-index:2}
  .cmp .colh{font:700 13.5px 'Bricolage Grotesque';color:var(--ink);min-width:172px}
  .cmp .colh .ad{font:500 11px Inter;color:var(--ink-soft);margin-top:1px}
  .cmp .colh select{margin-top:8px;font:500 11.5px Inter;padding:5px 7px;border:1px solid var(--line-2);border-radius:7px;background:var(--paper-2);color:var(--ink);width:100%}
  .cmp .num{font-family:'JetBrains Mono';white-space:nowrap}
  .cmp .sub2{font:400 10px Inter;color:var(--ink-faint);margin-top:2px}
  .cmp tr.ne td{background:rgba(45,110,126,.06)}
  .cmp tr.ne .rl{background:rgba(45,110,126,.11);color:var(--accent)}
  .cmp .ne-val{font:800 16px 'Bricolage Grotesque';color:var(--ink)}
  .cmp td.best .ne-val{color:var(--accent)}
  .cmp .bestbadge{display:inline-block;font:700 9px Inter;text-transform:uppercase;letter-spacing:.06em;color:#fff;background:var(--accent);border-radius:5px;padding:2px 6px;margin-left:6px;vertical-align:2px}
  .cmpnote{font:400 11.5px Inter;color:var(--ink-faint);line-height:1.55;margin-top:14px}
  .cmpnote b{color:var(--ink-soft)}

  /* view toggle */
  .vtoggle{display:inline-flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:var(--paper)}
  .vtoggle button{font:600 12px Inter;color:var(--ink-faint);background:none;border:0;padding:7px 15px;cursor:pointer}
  .vtoggle button.on{background:var(--building);color:#fff}

  /* deals table */
  .tstats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .tstat{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:10px 16px;min-width:132px}
  .tstat .k{font:600 10px Inter;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint)}
  .tstat .v{font:700 18px 'Bricolage Grotesque';color:var(--ink);margin-top:3px}
  .dtable-wrap{border:1px solid var(--line);border-radius:12px;overflow:auto}
  .dtable{width:100%;border-collapse:collapse;font-size:13px}
  .dtable th{font:600 10px Inter;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);text-align:left;padding:10px 12px;background:var(--paper);border-bottom:1px solid var(--line);white-space:nowrap}
  .dtable td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  .dtable tbody tr{cursor:pointer;transition:background .12s}
  .dtable tbody tr:hover{background:var(--paper)}
  .dtable tbody tr:last-child td,.dtable tr:last-child td{border-bottom:0}
  .dtable .num{font-family:'JetBrains Mono';text-align:right;white-space:nowrap}
  .dtable .cl b{font:700 13.5px 'Bricolage Grotesque'}
  .dtable tr.deadhdr td{background:var(--paper);font:600 10px Inter;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint);cursor:default;padding:7px 12px}
  .dtable tr.deadhdr:hover td{background:var(--paper)}
  .stagechip{font:600 10px Inter;padding:3px 9px;border-radius:999px;white-space:nowrap;border:1px solid var(--line-2);color:var(--ink-soft);background:var(--paper)}
  .stagechip.s-proposals{color:var(--accent)}
  .stagechip.s-negotiation{color:#b5651d}
  .stagechip.s-executed{color:#2e7d4f;border-color:#bfe3cd;background:rgba(46,140,90,.08)}
  .stagechip.s-dead{color:var(--ink-faint)}
  .cst{font:600 9px Inter;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:5px;margin-left:5px;white-space:nowrap}
  .cst.pending{background:#fbeecb;color:#9a6a00}
  .cst.invoiced{background:rgba(45,110,126,.13);color:var(--accent)}
  .cst.paid{background:rgba(46,140,90,.14);color:#2e7d4f}
  .pgbar{height:7px;background:var(--line);border-radius:999px;overflow:hidden;display:inline-block;width:78px;vertical-align:middle}
  .pgbar span{display:block;height:100%;background:var(--accent);border-radius:999px}
  .pgbar.big{width:100%;height:9px;margin:7px 0 0;display:block}
  .dtable .pg{white-space:nowrap}
  .dtable .pg em{font:600 11px 'JetBrains Mono';color:var(--ink-faint);font-style:normal;margin-left:7px}

  /* snapshot */
  .snap{display:grid;grid-template-columns:1.7fr 1fr;gap:14px;margin:18px 0 2px}
  .snap>div{background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:13px 16px;position:relative}
  .snap-k{font:600 10px Inter;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint)}
  .snap-sub{font:500 11.5px Inter;color:var(--ink-faint);margin-top:5px}
  .snap-commv{font:700 20px 'Bricolage Grotesque';color:var(--ink);margin-top:5px}
  .snap-comm .rev{position:absolute;top:12px;right:14px}

  /* transaction checklist */
  .phase{margin-bottom:15px}
  .phase-h{display:flex;align-items:center;gap:10px;margin:0 0 3px}
  .phase-t{font:600 11px Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft)}
  .phase-c{font:600 10px 'JetBrains Mono';color:var(--ink-faint);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .step{display:flex;align-items:center;gap:11px;padding:7px 3px;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:0}
  .stepdot{flex:none;width:17px;height:17px;border-radius:999px;border:2px solid var(--line-2);background:var(--paper);cursor:pointer;padding:0}
  .stepdot:hover{border-color:var(--accent)}
  .stepdot.active{border-color:var(--accent);background:radial-gradient(circle at center,var(--accent) 0 42%,transparent 44%)}
  .stepdot.done{border-color:var(--accent);background:var(--accent)}
  .stepdot.na{border-style:dashed}
  .step-l{flex:1;font:500 13px Inter;color:var(--ink);cursor:pointer}
  .step.done .step-l{color:var(--ink-faint);text-decoration:line-through}
  .step.na .step-l{color:var(--ink-faint);text-decoration:line-through;opacity:.7}
  .step-note-txt{font:500 11.5px Inter;color:var(--ink-faint);font-style:italic;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .step-actions{display:flex;align-items:center;gap:6px;flex:none}
  .step-due-in{font:500 11px Inter;padding:3px 6px;border:1px solid var(--line-2);border-radius:6px;background:var(--paper);color:var(--ink-soft)}
  .step-mini{font-size:12px;line-height:1;background:none;border:1px solid var(--line-2);border-radius:6px;padding:5px 7px;cursor:pointer;color:var(--ink-faint)}
  .step-mini:hover{border-color:var(--accent);color:var(--accent)}
  .step-mini.has{color:var(--accent);border-color:var(--accent)}
  @media(max-width:640px){ .snap{grid-template-columns:1fr} .step-note-txt{display:none} }

  /* sub-nav */
  .subnav{max-width:1120px;margin:0 auto;padding:16px 22px 0;display:flex;gap:6px}
  .subnav button{font:600 13px Inter;color:var(--ink-faint);background:none;border:0;border-bottom:2px solid transparent;padding:7px 4px;margin-right:12px;cursor:pointer}
  .subnav button:hover{color:var(--ink-soft)}
  .subnav button.on{color:var(--ink);border-bottom-color:var(--building)}

  /* dashboard */
  .dstats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .dstat{background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .dstat .k{font:600 10px Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint)}
  .dstat .v{font:800 26px 'Bricolage Grotesque';color:var(--ink);margin-top:4px;line-height:1}
  .dstat .s{font:500 11px Inter;color:var(--ink-faint);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .dpanel{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:8px 6px 10px}
  .dpanel-h{font:700 13px 'Bricolage Grotesque';color:var(--ink);padding:8px 12px 10px;border-bottom:1px solid var(--line);margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
  .dpanel-x{font:600 11.5px Inter;color:var(--accent);cursor:pointer}
  .dpanel-x:hover{text-decoration:underline}
  .dempty{font:400 12px Inter;color:var(--ink-faint);padding:16px 12px}
  .due{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .due:last-child{border-bottom:0}
  .due:hover{background:var(--paper)}
  .due-when{font:700 11px 'JetBrains Mono';color:var(--ink-faint);width:56px;flex:none}
  .due.over .due-when{color:var(--dining)}
  .due-l{flex:1;font:500 12.5px Inter;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .due-l em{color:var(--ink-faint);font-style:normal}
  .due-kind{display:inline-block;width:7px;height:7px;border-radius:999px;margin-right:7px;vertical-align:1px;background:var(--ink-faint)}

    $('dashboardView').style.display='none';

  function setPipeView(v){ _view=v; try{ localStorage.setItem('vantage_deal_view',v); }catch(e){} showPipeline(); }

  function renderBoard(){
    var live=deals.filter(function(d){ return d.stage!=='dead'; });
    var html=STAGES.map(function(s){
      var inStage=live.filter(function(d){ return d.stage===s[0]; });

      return '<div class="pcol"><div class="ph"><span class="t">'+s[1]+'</span><span class="c">'+inStage.length+'</span></div>'+cards+'</div>';
    }).join('');
    $('pipe').style.gridTemplateColumns='repeat('+STAGES.length+',minmax(176px,1fr))';
    $('pipe').innerHTML=html;
    var dead=deals.filter(function(d){ return d.stage==='dead'; });
    $('closed').innerHTML = dead.length
      ? '<div class="closedsec"><button class="closedtog" onclick="DF.toggleClosed()">'+(_showClosed?'▾':'▸')+' Closed / dead ('+dead.length+')</button>'
        + (_showClosed?'<div class="closedlist">'+dead.map(dealCard).join('')+'</div>':'')+'</div>'
      : '';
  }
  function toggleClosed(){ _showClosed=!_showClosed; renderBoard(); }
  function dealCard(d){
    var comm=d.commission_amount!=null?money(d.commission_amount):(num(d.commission_pct)!=null?d.commission_pct+'%':null);
    return '<div class="dcard" onclick="DF.openDeal(\''+d.id+'\')">'
      + '<div class="nm">'+esc(d.client_name||'Untitled client')+'</div>'
      + '<div class="mt"><span>Created '+new Date(d.created_at).toLocaleDateString()+'</span>'+(comm?'<span>· <b>'+comm+'</b></span>':'')+'</div>'
      + '</div>';
  }

  /* Table view — every client, line by line, with stage, terms, commission, progress. */
  async function renderTable(){
    var el=$('dealTable');
    if(!deals.length){ el.innerHTML='<div class="sub" style="color:var(--ink-faint);padding:26px 2px">No deals yet. Click <b>New deal</b> to start tracking a client.</div>'; return; }
    el.innerHTML='<div class="loading">Loading deals…</div>';
    var agg;
    try{ agg=await loadAgg(); }catch(e){ el.innerHTML='<div class="loading">Could not load deals: '+esc(e.message)+'</div>'; return; }
    var live=deals.filter(function(d){return d.stage!=='dead';});
    var dead=deals.filter(function(d){return d.stage==='dead';});
    var pipeComm=live.reduce(function(s,d){return s+(num(d.commission_amount)||0);},0);
    var paidComm=deals.filter(function(d){return d.commission_status==='paid';}).reduce(function(s,d){return s+(num(d.commission_amount)||0);},0);
    var head='<div class="tstats">'
      +'<div class="tstat"><div class="k">Active deals</div><div class="v">'+live.length+'</div></div>'
      +'<div class="tstat"><div class="k">Pipeline commission</div><div class="v">'+money(pipeComm)+'</div></div>'
      +'<div class="tstat"><div class="k">Commission collected</div><div class="v">'+money(paidComm)+'</div></div>'
      +'</div>';
    function row(d){
      var a=agg[d.id]||{};
      var econ=a.round||{};
      var size=econ.size_sf!=null?Number(econ.size_sf).toLocaleString():'—';
      var rent=econ.base_rent_psf!=null?psf(econ.base_rent_psf):'—';
      var term=econ.term_months!=null?(econ.term_months+'mo'):'—';
      var comm=d.commission_amount!=null?money(d.commission_amount):(num(d.commission_pct)!=null?d.commission_pct+'%':'—');
      var cstat=d.commission_status?'<span class="cst '+d.commission_status+'">'+(COMM_STATUS.filter(function(c){return c[0]===d.commission_status;})[0]||['','?'])[1]+'</span>':'';
      var denom=(a.stepsTotal||0)-(a.stepsNa||0);
      var prog=denom>0?Math.round(100*(a.stepsDone||0)/denom):0;
      var pgcell=a.stepsTotal?('<div class="pgbar"><span style="width:'+prog+'%"></span></div><em>'+prog+'%</em>'):'<em style="color:var(--ink-faint)">—</em>';
      return '<tr onclick="DF.openDeal(\''+d.id+'\')">'
        +'<td class="cl"><b>'+esc(d.client_name||'Untitled')+'</b></td>'
        +'<td><span class="stagechip s-'+d.stage+'">'+esc(STAGE_LABEL[d.stage]||d.stage)+'</span></td>'
        +'<td>'+esc(a.building||'—')+'</td>'
        +'<td class="num">'+size+'</td>'
        +'<td class="num">'+rent+'</td>'
        +'<td class="num">'+term+'</td>'
        +'<td class="num">'+comm+cstat+'</td>'
        +'<td class="pg">'+pgcell+'</td>'
        +'</tr>';
    }
    var body=live.map(row).join('')
      + (dead.length?('<tr class="deadhdr"><td colspan="8">Closed / dead ('+dead.length+')</td></tr>'+dead.map(row).join('')):'');
    el.innerHTML=head+'<div class="dtable-wrap"><table class="dtable"><thead><tr>'
      +'<th>Client</th><th>Stage</th><th>Building</th><th class="num">Size SF</th><th class="num">Base $/SF</th><th class="num">Term</th><th class="num">Commission</th><th>Progress</th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>';
  }

  // Bulk aggregate across all deals: primary building, latest final round economics, step progress.
  async function loadAgg(){
    var ids=deals.map(function(d){return d.id;});
    var agg={}; deals.forEach(function(d){ agg[d.id]={}; });
    if(!ids.length) return agg;
    var props=[], proposals=[], rounds=[], steps=[];
    try{ props=await q(sb.from('deal_properties').select('id,deal_id,name,sort_order').in('deal_id',ids)); }catch(e){}
    try{ proposals=await q(sb.from('proposals').select('id,deal_id,property_id,created_at').in('deal_id',ids)); }catch(e){}
    try{ rounds=await q(sb.from('proposal_rounds').select('deal_id,round_no,status,base_rent_psf,size_sf,term_months').eq('status','final').in('deal_id',ids)); }catch(e){}
    try{ steps=await q(sb.from('deal_steps').select('deal_id,status').in('deal_id',ids)); }catch(e){}
    var propName={}; props.forEach(function(p){ propName[p.id]=p.name; });
    var propsByDeal={}; props.forEach(function(p){ (propsByDeal[p.deal_id]=propsByDeal[p.deal_id]||[]).push(p); });
    var proposalsByDeal={}; proposals.forEach(function(pr){ (proposalsByDeal[pr.deal_id]=proposalsByDeal[pr.deal_id]||[]).push(pr); });
    var bestRound={}; rounds.forEach(function(r){ var b=bestRound[r.deal_id]; if(!b||r.round_no>b.round_no) bestRound[r.deal_id]=r; });
    var stepAgg={}; steps.forEach(function(s){ var a=stepAgg[s.deal_id]=stepAgg[s.deal_id]||{done:0,na:0,total:0}; a.total++; if(s.status==='done') a.done++; else if(s.status==='na') a.na++; });
    deals.forEach(function(d){
      var a=agg[d.id]; var bldg=null;
      var prs=(proposalsByDeal[d.id]||[]).slice().sort(function(x,y){return (x.created_at||'').localeCompare(y.created_at||'');});
      for(var i=0;i<prs.length;i++){ if(prs[i].property_id&&propName[prs[i].property_id]){ bldg=propName[prs[i].property_id]; break; } }
      if(!bldg){ var dp=(propsByDeal[d.id]||[]).slice().sort(function(x,y){return (x.sort_order||0)-(y.sort_order||0);}); if(dp.length) bldg=dp[0].name; }
      a.building=bldg; a.round=bestRound[d.id]||null;
      var sa=stepAgg[d.id]||{done:0,na:0,total:0}; a.stepsDone=sa.done; a.stepsNa=sa.na; a.stepsTotal=sa.total;
    });
    return agg;
  }

  /* ---------- dashboard / broker home ---------- */
  function setSubnav(v){ var n=$('subnav'); if(n){ [].forEach.call(n.children,function(b){ b.className=(b.getAttribute('data-view')===v)?'on':''; }); } }
  function daysUntil(ds){ if(!ds) return null; var t=new Date(ds+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0); return Math.round((t-now)/86400000); }

  async function showDashboard(){
    $('pipelineView').style.display='none';
    $('dealView').style.display='none';
    var mv2=$('modelView'); if(mv2) mv2.style.display='none';
    $('dashboardView').style.display='block';
    $('crumb').innerHTML='Deal flow';
    setSubnav('dashboard');
    if(window.Van) Van.setContext({dealId:null, label:'your pipeline'});
    renderDashboard();
  }

  async function loadDashData(){
    var out={tasks:[],steps:[],absts:[]};
    try{ out.tasks=await q(sb.from('deal_tasks').select('*').order('due_date',{ascending:true,nullsFirst:false})); }catch(e){}
    try{ out.steps=await q(sb.from('deal_steps').select('deal_id,label,due_date,status').not('due_date','is',null).in('status',['pending','active'])); }catch(e){}
    try{ out.absts=await q(sb.from('lease_abstracts').select('deal_id,key_dates,expiration_date')); }catch(e){}
    return out;
  }

  function statCard(k,v,sub){ return '<div class="dstat"><div class="k">'+k+'</div><div class="v">'+v+'</div>'+(sub?'<div class="s">'+esc(sub)+'</div>':'')+'</div>'; }
  function byStageMini(active){ var c={}; active.forEach(function(d){ c[d.stage]=(c[d.stage]||0)+1; }); return STAGES.filter(function(s){return c[s[0]];}).map(function(s){ return c[s[0]]+' '+s[1].toLowerCase(); }).join(' · '); }

  async function renderDashboard(){
    var el=$('dashboardView');
    el.innerHTML='<div class="loading">Loading your dashboard…</div>';
    var data; try{ data=await loadDashData(); }catch(e){ el.innerHTML='<div class="loading">Could not load dashboard: '+esc(e.message)+'</div>'; return; }
    var tasks=data.tasks||[], steps=data.steps||[], absts=data.absts||[];
    var year=new Date().getFullYear();
    var dealById={}; deals.forEach(function(d){ dealById[d.id]=d; });
    var active=deals.filter(function(d){ return d.stage!=='dead' && d.stage!=='executed'; });
    var pipeComm=active.reduce(function(s,d){ return s+(num(d.commission_amount)||0); },0);
    var collectedYTD=deals.filter(function(d){ return d.commission_status==='paid' && d.commission_paid_on && (new Date(d.commission_paid_on)).getFullYear()===year; }).reduce(function(s,d){ return s+(num(d.commission_amount)||0); },0);
    var collectedAll=deals.filter(function(d){ return d.commission_status==='paid'; }).reduce(function(s,d){ return s+(num(d.commission_amount)||0); },0);
    var openTasks=tasks.filter(function(t){ return !t.done; });
    var overdue=0;
    openTasks.forEach(function(t){ if(t.due_date&&daysUntil(t.due_date)<0) overdue++; });
    steps.forEach(function(s){ if(daysUntil(s.due_date)<0) overdue++; });

    // "What's due" — merge tasks, checklist steps, and lease critical dates
    var feed=[];
    openTasks.forEach(function(t){ if(t.due_date) feed.push({date:t.due_date, kind:'task', label:t.title, dealId:t.deal_id, id:t.id}); });
    steps.forEach(function(s){ feed.push({date:s.due_date, kind:'step', label:s.label, dealId:s.deal_id}); });
    absts.forEach(function(a){
      (a.key_dates||[]).forEach(function(k){ if(k&&k.date) feed.push({date:k.date, kind:'critical', label:(k.label||'Critical date'), dealId:a.deal_id}); });
      if(a.expiration_date) feed.push({date:a.expiration_date, kind:'critical', label:'Lease expiration', dealId:a.deal_id});
    });
    feed.sort(function(x,y){ return x.date<y.date?-1:(x.date>y.date?1:0); });
    var feedItems=feed.filter(function(f){ var du=daysUntil(f.date); return du!=null && du<=60; }).slice(0,14);

    var recs=buildRecs(active, steps, tasks, absts, dealById);

    el.innerHTML =
      '<div class="vhead"><div><h1>Dashboard</h1><div class="sub">Your book of business at a glance.</div></div>'
      + '<button class="share-btn" onclick="DF.newTask(null)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add task</button></div>'
      + '<div class="dstats">'
      +   statCard('Commission collected (YTD)', money(collectedYTD), collectedAll>collectedYTD?('All-time '+money(collectedAll)):'')
      +   statCard('Pipeline commission', money(pipeComm), active.length+' active deal'+(active.length===1?'':'s'))
      +   statCard('Deals in pipeline', String(active.length), byStageMini(active))
      +   statCard('Open tasks', String(openTasks.length), overdue?(overdue+' overdue'):'on track')
      + '</div>'
      + '<div class="dgrid">'
      +   '<div class="dpanel"><div class="dpanel-h">What\'s due <span class="dpanel-x" onclick="DF.newTask(null)">+ task</span></div>'
      +     (feedItems.length? feedItems.map(function(f){ return feedRow(f,dealById); }).join('') : '<div class="dempty">Nothing due in the next 60 days. Add a task to stay ahead.</div>')
      +   '</div>'
      +   '<div class="dpanel"><div class="dpanel-h">Recommended next steps</div>'
      +     (recs.length? recs.map(recRow).join('') : '<div class="dempty">You\'re all caught up. Nice work 🎉</div>')
      +   '</div>'
      + '</div>';
  }

  function feedRow(f, dealById){
    var d=dealById[f.dealId]; var client=d?(d.client_name||'Deal'):'';
    var du=daysUntil(f.date), over=du<0;
    var when= over? (Math.abs(du)+'d late') : (du===0?'today':(du+'d'));
    return '<div class="due'+(over?' over':'')+'"'+(f.dealId?' onclick="DF.openDeal(\''+f.dealId+'\')"':'')+'>'
      + '<span class="due-when">'+esc(when)+'</span>'
      + '<span class="due-l"><span class="due-kind '+f.kind+'"></span>'+esc(f.label)+(client?' <em>· '+esc(client)+'</em>':'')+'</span>'
      + '<span class="due-date">'+fmtDate(f.date)+'</span>'
      + (f.kind==='task'?'<button class="due-done" onclick="event.stopPropagation();DF.toggleTask(\''+f.id+'\',true)" title="Mark done">✓</button>':'')
      + '</div>';
  }
  function recRow(r){
    return '<div class="rec sev'+r.sev+'"'+(r.dealId?' onclick="DF.openDeal(\''+r.dealId+'\')"':'')+'>'
      + '<span class="rec-dot"></span><span class="rec-t">'+esc(r.text)+'</span><span class="rec-go">→</span></div>';
  }
  function buildRecs(active, steps, tasks, absts, dealById){
    var recs=[];
    steps.forEach(function(s){ var du=daysUntil(s.due_date); if(du!=null&&du<0){ var d=dealById[s.deal_id]; recs.push({sev:2, dealId:s.deal_id, text:'You\'re behind on “'+s.label+'”'+(d?' for '+(d.client_name||'a client'):'')}); } });
    tasks.forEach(function(t){ if(!t.done&&t.due_date){ var du=daysUntil(t.due_date); if(du!=null&&du<0){ var d=dealById[t.deal_id]; recs.push({sev:2, dealId:t.deal_id, text:'Overdue task: '+t.title+(d&&d.client_name?' — '+d.client_name:'')}); } } });
    absts.forEach(function(a){ if(a.expiration_date){ var du=daysUntil(a.expiration_date); if(du!=null&&du>=0&&du<=120){ var d=dealById[a.deal_id]; recs.push({sev:1, dealId:a.deal_id, text:(d&&d.client_name?d.client_name:'A client')+'’s lease expires in '+du+' days — start the renewal conversation'}); } } });
    var taskDeal={}; tasks.forEach(function(t){ if(!t.done&&t.deal_id) taskDeal[t.deal_id]=true; });
    active.forEach(function(d){ if(!taskDeal[d.id]) recs.push({sev:0, dealId:d.id, text:'No next action set for '+(d.client_name||'a deal')+' — add a task'}); });
    active.forEach(function(d){ if(d.commission_amount==null && d.commission_pct==null) recs.push({sev:0, dealId:d.id, text:'Add commission terms for '+(d.client_name||'a deal')}); });
    recs.sort(function(a,b){ return b.sev-a.sev; });
    return recs.slice(0,7);
  }

  /* ---------- tasks ---------- */
  function tasksSection(d, tasks){
    tasks=tasks||[];
    var open=tasks.filter(function(t){return !t.done;}), done=tasks.filter(function(t){return t.done;});
    var rows=open.length? open.map(function(t){ return taskRow(t,d.id); }).join('') : '<div class="sub" style="color:var(--ink-faint);font-size:12.5px">No open tasks.</div>';
    var doneRows=done.length?('<details class="tasks-done"><summary>'+done.length+' completed</summary>'+done.map(function(t){return taskRow(t,d.id);}).join('')+'</details>'):'';
    return rows+doneRows+'<button class="miniadd" onclick="DF.newTask(\''+d.id+'\')">+ Add task</button>';
  }
  function taskRow(t, dealId){
    var over=(!t.done && t.due_date && daysUntil(t.due_date)<0);
    return '<div class="task'+(t.done?' done':'')+'">'
      + '<button class="taskchk'+(t.done?' on':'')+'" onclick="DF.toggleTask(\''+t.id+'\','+(t.done?'false':'true')+',\''+dealId+'\')" title="'+(t.done?'Reopen':'Mark done')+'"></button>'
      + '<span class="task-l">'+esc(t.title)+'</span>'
      + (t.priority==='high'&&!t.done?'<span class="task-pri">High</span>':'')
      + (t.due_date?'<span class="task-due'+(over?' over':'')+'">'+fmtDate(t.due_date)+'</span>':'')
      + '<button class="step-mini" onclick="DF.newTask(\''+dealId+'\',\''+t.id+'\')" title="Edit">✎</button>'
      + '<button class="delx" onclick="DF.deleteTask(\''+t.id+'\',\''+dealId+'\')">remove</button>'
      + '</div>';
  }
  function refreshTaskViews(dealId){
    if($('dashboardView') && $('dashboardView').style.display!=='none') renderDashboard();
    else if(dealId && $('dealView').style.display!=='none') reloadTasks(dealId);
  }
  async function reloadTasks(dealId){
    var d=deals.filter(function(x){return x.id===dealId;})[0]; if(!d) return;
    var tasks=[]; try{ tasks=await q(sb.from('deal_tasks').select('*').eq('deal_id',dealId).order('due_date',{ascending:true,nullsFirst:false})); }catch(e){}
    var tb=$('tasksBody'); if(tb) tb.innerHTML=tasksSection(d,tasks);
  }
  async function toggleTask(id, done, dealId){
    try{ await q(sb.from('deal_tasks').update({done:done, completed_at: done?new Date().toISOString():null}).eq('id',id)); refreshTaskViews(dealId); }
    catch(e){ alert('Could not update task: '+(e.message||e)); }
  }
  async function deleteTask(id, dealId){
    if(!confirm('Remove this task?')) return;
    try{ await q(sb.from('deal_tasks').delete().eq('id',id)); refreshTaskViews(dealId); }
    catch(e){ alert('Could not remove task: '+(e.message||e)); }
  }
  async function newTask(dealId, taskId){
    var t={}; if(taskId){ try{ t=(await q(sb.from('deal_tasks').select('*').eq('id',taskId).limit(1)))[0]||{}; }catch(e){} }
    var dealPicker='';
    if(!dealId){
      var opts=deals.filter(function(d){return d.stage!=='dead';}).map(function(d){ return '<option value="'+d.id+'"'+((t.deal_id===d.id)?' selected':'')+'>'+esc(d.client_name||'Untitled')+'</option>'; }).join('');
      dealPicker=fld('Link to deal (optional)','<select id="t_deal"><option value="">— none —</option>'+opts+'</select>');
    }
    openSheet('<h3>'+(taskId?'Edit task':'New task')+'</h3>'
      + fld('Task','<input id="t_title" value="'+esc(t.title||'')+'" placeholder="e.g. Follow up with landlord on TI" autofocus>')
      + '<div class="grid2">'
      +   fld('Due date','<input id="t_due" type="date" value="'+(t.due_date||'')+'">')
      +   fld('Priority','<select id="t_pri">'+selOpts([['low','Low'],['normal','Normal'],['high','High']], t.priority||'normal')+'</select>')
      + '</div>'
      + dealPicker
      + '<div class="formerr" id="f_err"></div>'
      + '<div class="srow"><button class="btn" onclick="DF.close()">Cancel</button><button class="btn pri" id="f_save">'+(taskId?'Save':'Add task')+'</button></div>');
    $('f_save').addEventListener('click',async function(){
      var title=($('t_title').value||'').trim(); if(!title){ $('f_err').textContent='Enter a task.'; return; }
      this.disabled=true; this.textContent='Saving…';
      var linkDeal = dealId || ($('t_deal')?($('t_deal').value||null):null);
      var patch={title:title, due_date:($('t_due').value||null), priority:$('t_pri').value, deal_id:linkDeal};
      try{
        if(taskId){ await q(sb.from('deal_tasks').update(patch).eq('id',taskId)); }
        else{ patch.owner_id=me.id; await q(sb.from('deal_tasks').insert(patch)); }
        closeSheet(); refreshTaskViews(dealId||linkDeal);
      }catch(e){ $('f_err').textContent=/deal_tasks|does not exist/i.test(e.message||'')?'Run the deal-tasks SQL in Supabase first.':(e.message||''+e); this.disabled=false; this.textContent=taskId?'Save':'Add task'; }
    });
  }

  /* ---------- deal detail view ---------- */
  async function openDeal(id){
    var d=deals.filter(function(x){return x.id===id;})[0]; if(!d) return;
    $('pipelineView').style.display='none';
    $('dashboardView').style.display='none';
    var mv3=$('modelView'); if(mv3) mv3.style.display='none';
    setSubnav('deal');
    if(window.Van) Van.setContext({dealId:id, label:(d.client_name||'this deal')});
    var v=$('dealView'); v.style.display='block';
    $('crumb').innerHTML='Deal flow <b>›</b> '+esc(d.client_name||'Deal');
    v.innerHTML='<div class="loading">Loading deal…</div>';
    try{
      var props=await q(sb.from('deal_properties').select('*').eq('deal_id',id).order('sort_order'));
      var proposals=await q(sb.from('proposals').select('*').eq('deal_id',id).order('created_at'));
      var rounds=await q(sb.from('proposal_rounds').select('*').eq('deal_id',id).order('round_no'));
      var docs=await q(sb.from('documents').select('*').eq('deal_id',id).order('created_at'));
      var tours=await q(sb.from('tour_stops').select('*').eq('deal_id',id).order('scheduled_at',{ascending:true,nullsFirst:false}));
      var abstracts=await q(sb.from('lease_abstracts').select('*').eq('deal_id',id).order('created_at'));
      var events=[]; try{ events=await q(sb.from('deal_events').select('type,created_at').eq('deal_id',id).order('created_at',{ascending:false})); }catch(e){}
      var steps=[]; try{ steps=await q(sb.from('deal_steps').select('*').eq('deal_id',id).order('sort_order')); }catch(e){}
      var tasks=[]; try{ tasks=await q(sb.from('deal_tasks').select('*').eq('deal_id',id).order('due_date',{ascending:true,nullsFirst:false})); }catch(e){}
      renderDeal(d,props,proposals,rounds,docs,tours,abstracts[0]||null,events,steps,tasks);
    }catch(e){ v.innerHTML='<div class="loading">Could not load deal: '+esc(e.message)+'</div>'; }
  }

  function ago(iso){ if(!iso) return ''; var s=Math.floor((Date.now()-new Date(iso).getTime())/1000); if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago'; if(s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
  function renderDeal(d,props,proposals,rounds,docs,tours,abstract,events,steps,tasks){
    steps=steps||[]; tasks=tasks||[];
    var ev=events||[];
    var opens=ev.filter(function(e){return e.type==='open';}).length;
    var dls=ev.filter(function(e){return e.type==='download';}).length;
    var engLine = ev.length ? '<div class="meta" style="margin-top:3px"><span style="color:var(--accent)">👁 Client opened '+opens+'×</span>'+(ev[0]?' · last '+ago(ev[0].created_at):'')+(dls?' · '+dls+' PDF download'+(dls>1?'s':''):'')+'</div>' : '';
    var stageOpts=Object.keys(STAGE_LABEL).map(function(k){
      return '<option value="'+k+'"'+(d.stage===k?' selected':'')+'>'+STAGE_LABEL[k]+'</option>';
    }).join('');

    var propById={}; props.forEach(function(p){ propById[p.id]=p; });

    var toursHtml = (tours&&tours.length) ? tours.map(function(s){ return tourCard(s, propById, d.id); }).join('')
      : '<div class="sub" style="color:var(--ink-faint);font-size:12.5px">No tour stops scheduled yet.</div>';
    var toursSection = toursHtml + '<button class="miniadd" onclick="DF.newTourStop(\''+d.id+'\')">+ Add tour stop</button>';

    var propsHtml = props.length ? props.map(function(p){
      return '<div class="pcard"><div class="top"><div><div class="nm">'+esc(p.name||'Untitled building')+'</div>'
        + (p.address?'<div class="ad">'+esc(p.address)+'</div>':'')
        + '</div><span class="tag">'+esc((PROP_STATUS.filter(function(s){return s[0]===p.status;})[0]||['','—'])[1])+'</span></div></div>';
    }).join('') : '<div class="sub" style="color:var(--ink-faint);font-size:12.5px">No buildings yet.</div>';

    var propsHtml2 = propsHtml + '<button class="miniadd" onclick="DF.newProperty(\''+d.id+'\')">+ Add building</button>';

    // group rounds + documents by proposal
    var roundsByProp={}; rounds.forEach(function(r){ (roundsByProp[r.proposal_id]=roundsByProp[r.proposal_id]||[]).push(r); });
    var docsByProp={}; (docs||[]).forEach(function(dc){ if(dc.proposal_id){ (docsByProp[dc.proposal_id]=docsByProp[dc.proposal_id]||[]).push(dc); } });
    var leaseDocs=(docs||[]).filter(function(dc){ return !dc.proposal_id; });   // deal-level / lease docs (e.g. the signed lease PDF)

    var propsHtmlList = proposals.length ? proposals.map(function(pr){
      var rs=(roundsByProp[pr.id]||[]);
      var bldg = pr.property_id && propById[pr.property_id] ? propById[pr.property_id].name : null;
      var rowsHtml = rs.length ? rs.map(roundRow).join('') :
        '<tr><td colspan="9" style="color:var(--ink-faint)">No rounds yet — add the first proposal terms.</td></tr>';
      var visBtn='<button class="vis '+(pr.client_visible?'on':'')+'" onclick="DF.toggleProposalVisible(\''+pr.id+'\','+(pr.client_visible?'false':'true')+',\''+d.id+'\')" title="Toggle whether the client can see this proposal">'
        +(pr.client_visible?'● Shown to client':'○ Hidden from client')+'</button>';
      return '<div class="pcard">'
        + '<div class="top"><div><div class="nm">'+esc(pr.title||'Proposal')+'</div>'
        +   (bldg?'<div class="ad">'+esc(bldg)+'</div>':'')+'</div>'
        +   '<div style="display:flex;gap:8px;align-items:center">'+visBtn+'<span class="tag">'+esc(pr.status)+'</span></div></div>'
        + '<div class="rounds"><table class="rtable"><thead><tr>'
        +   '<th>Rd</th><th>From</th><th>Structure</th><th class="num">Base $/SF</th><th class="num">Opex</th>'
        +   '<th class="num">≈ Gross</th><th class="num">Size SF</th><th class="num">Term</th><th>Notes</th>'
        + '</tr></thead><tbody>'+rowsHtml+'</tbody></table></div>'
        + docsBlock(pr.id, d.id, docsByProp[pr.id]||[])
        + '<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">'
        +   '<button class="miniadd" onclick="DF.newRound(\''+d.id+'\',\''+pr.id+'\')">+ Add round</button>'
        +   '<button class="miniadd ai" onclick="DF.aiDraft(\''+d.id+'\',\''+pr.id+'\')">✨ Draft with AI</button>'
        + '</div>'
        + '</div>';
    }).join('') : '<div class="sub" style="color:var(--ink-faint);font-size:12.5px">No proposals yet.</div>';

    var cmpBtn = proposals.length ? '<button class="miniadd" onclick="DF.openCompare(\''+d.id+'\')">⇄ Compare proposals</button>' : '';
    var addProposalBtn = '<div style="display:flex;gap:16px;align-items:center">'+cmpBtn+'<button class="miniadd" onclick="DF.newProposal(\''+d.id+'\')">+ Add proposal</button></div>';

    $('dealView').innerHTML =
      '<button class="dsr-back" style="margin-bottom:14px" onclick="DF.showPipeline()">‹ All deals</button>'
      + '<div class="dealhead"><div><h1>'+esc(d.client_name||'Untitled client')+'</h1>'
      +   '<div class="meta">Created '+new Date(d.created_at).toLocaleDateString()+(d.slug?' · <span style="color:var(--fitness)">client link active</span>':'')+'</div>'+engLine+'</div>'
      +   '<div class="dhactions">'
      +     '<button class="act-btn" onclick="DF.shareDeal(\''+d.id+'\')" title="Create a private, read-only link for the client">'
      +       '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>'
      +       (d.slug?'Client link':'Share with client')+'</button>'
      +     '<div class="stagepick"><label>Stage</label>'
      +     '<select class="fld" style="width:auto" onchange="DF.setStage(\''+d.id+'\',this.value)">'+stageOpts+'</select></div>'
      +   '</div>'
      + '</div>'
      + '<div id="snapWrap">'+snapshotSection(d,steps)+'</div>'
      + '<div class="sec"><div class="sec-h"><h2>Tasks &amp; next steps</h2><span class="hint">Your to-dos for this client</span></div><div id="tasksBody">'+tasksSection(d,tasks)+'</div></div>'
      + '<div class="sec"><div class="sec-h"><h2>Occupancy model</h2><span class="hint">Compare options side-by-side — net effective, all-in &amp; NPV</span></div>'
      +   '<div class="modelcta"><div><div class="modelcta-t">Build the financial case</div><div class="modelcta-s">Model stay-vs-go and every option with full opex, parking, concessions, one-time costs, and headcount-growth bands — the numbers that justify your fee.</div></div>'
      +   '<button class="share-btn" onclick="DF.openModel(\''+d.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg> Open occupancy model</button></div>'
      + '</div>'
      + '<div class="sec"><div class="sec-h"><h2>Buildings</h2><span class="hint">The properties in play for this client</span></div>'+propsHtml2+'</div>'
      + '<div class="sec"><div class="sec-h"><h2>Tour schedule</h2><span class="hint">Building visits for this client</span></div>'+toursSection+'</div>'
      + '<div class="sec"><div class="sec-h"><h2>Proposals &amp; rounds</h2>'+addProposalBtn+'</div>'+propsHtmlList+'</div>'
      + '<div class="sec"><div class="sec-h"><h2>Transaction checklist</h2><span class="hint">Every step from engagement to move-in</span></div><div id="checklistBody">'+checklistSection(d,steps)+'</div></div>'
      + '<div class="sec"><div class="sec-h"><h2>Lease abstract</h2><span class="hint">The executed lease\'s key terms — your client\'s permanent record</span></div>'
      +   (abstract ? abstractCard(abstract, d.id)
                    : '<div class="sub" style="color:var(--ink-faint);font-size:12.5px">No lease abstract yet.</div><button class="miniadd" onclick="DF.editAbstract(\''+d.id+'\')">+ Create lease abstract</button>')
      +   leaseDocsBlock(d.id, abstract?abstract.id:null, leaseDocs)
      + '</div>';
  }

  /* ---------- deal snapshot: progress + commission ---------- */
  function snapshotSection(d, steps){
    steps=steps||[];
    var total=steps.length, na=0, done=0;
    steps.forEach(function(s){ if(s.status==='done') done++; else if(s.status==='na') na++; });
    var denom=total-na, prog=denom>0?Math.round(100*done/denom):0;
    var commAmt = d.commission_amount!=null ? money(d.commission_amount)
      : (num(d.commission_pct)!=null && num(d.deal_value)!=null ? money(num(d.deal_value)*num(d.commission_pct)/100) : null);
    var cstat = d.commission_status ? (COMM_STATUS.filter(function(c){return c[0]===d.commission_status;})[0]||['','—'])[1] : null;
    var sub=[]; if(d.deal_value!=null) sub.push('Deal value '+money(d.deal_value)); if(d.commission_pct!=null) sub.push(d.commission_pct+'%');
    return '<div class="snap">'
      + '<div class="snap-prog">'
      +   '<div class="snap-k">Transaction progress</div>'
      +   (total
            ? '<div class="pgbar big"><span style="width:'+prog+'%"></span></div>'
              + '<div class="snap-sub">'+done+' of '+denom+' steps complete'+(prog===100?' · complete 🎉':'')+'</div>'
            : '<div class="snap-sub" style="margin-top:8px">Not set up yet.</div><button class="miniadd" onclick="DF.seedSteps(\''+d.id+'\')">+ Set up transaction checklist</button>')
      + '</div>'
      + '<div class="snap-comm">'
      +   '<button class="rev" onclick="DF.editCommission(\''+d.id+'\')">edit</button>'
      +   '<div class="snap-k">Commission</div>'
      +   '<div class="snap-commv">'+(commAmt||'—')+(cstat?' <span class="cst '+d.commission_status+'">'+cstat+'</span>':'')+'</div>'
      +   (sub.length?'<div class="snap-sub">'+sub.join(' · ')+'</div>':'<div class="snap-sub">Add deal value &amp; fee</div>')
      + '</div>'
      + '</div>';
  }

  /* ---------- transaction checklist ---------- */
  function checklistSection(d, steps){
    steps=steps||[];
    if(!steps.length){
      return '<div class="sub" style="color:var(--ink-faint);font-size:12.5px">No checklist yet — set up the full lease-transaction checklist to track every step from engagement to move-in.</div>'
        + '<button class="miniadd" onclick="DF.seedSteps(\''+d.id+'\')">+ Set up transaction checklist</button>';
    }
    var phases=[], byPhase={};
    steps.forEach(function(s){ var p=s.phase||'Other'; if(!byPhase[p]){ byPhase[p]=[]; phases.push(p); } byPhase[p].push(s); });
    return phases.map(function(p){
      var arr=byPhase[p], done=0, na=0;
      arr.forEach(function(s){ if(s.status==='done') done++; else if(s.status==='na') na++; });
      return '<div class="phase">'
        + '<div class="phase-h"><span class="phase-t">'+esc(p)+'</span><span class="phase-c">'+done+'/'+(arr.length-na)+'</span></div>'
        + arr.map(function(s){ return stepRow(s, d.id); }).join('')
        + '</div>';
    }).join('');
  }
  function stepRow(s, dealId){
    var st=STEP_STATUS[s.status]||STEP_STATUS.pending;
    return '<div class="step '+st.cls+'">'
      + '<button class="stepdot '+st.cls+'" onclick="DF.cycleStep(\''+s.id+'\',\''+dealId+'\',\''+s.status+'\')" title="Click to advance: to-do → in progress → done"></button>'
      + '<span class="step-l" onclick="DF.cycleStep(\''+s.id+'\',\''+dealId+'\',\''+s.status+'\')">'+esc(s.label)+'</span>'
      + (s.notes?'<span class="step-note-txt" title="'+esc(s.notes)+'">'+esc(s.notes)+'</span>':'')
      + '<span class="step-actions">'
      +   '<input type="date" class="step-due-in" value="'+(s.due_date||'')+'" onchange="DF.stepDue(\''+s.id+'\',this.value,\''+dealId+'\')" title="Due date">'
      +   '<button class="step-mini'+(s.notes?' has':'')+'" onclick="DF.stepNote(\''+s.id+'\',\''+dealId+'\')" title="'+(s.notes?'Edit note':'Add note')+'">✎</button>'
      +   '<button class="step-mini" onclick="DF.stepNA(\''+s.id+'\',\''+dealId+'\','+(s.status==='na'?'true':'false')+')" title="'+(s.status==='na'?'Un-skip':'Mark not applicable')+'">'+(s.status==='na'?'↩':'∅')+'</button>'
      + '</span>'
      + '</div>';
  }
  async function reloadSteps(dealId){
    var d=deals.filter(function(x){return x.id===dealId;})[0]; if(!d) return;
    var steps=[]; try{ steps=await q(sb.from('deal_steps').select('*').eq('deal_id',dealId).order('sort_order')); }catch(e){}
    var cb=$('checklistBody'); if(cb) cb.innerHTML=checklistSection(d,steps);
    var sw=$('snapWrap'); if(sw) sw.innerHTML=snapshotSection(d,steps);
  }
  async function seedSteps(dealId){
    try{
      var rows=STEP_TEMPLATE.map(function(t,i){ return {deal_id:dealId, phase:t[0], label:t[1], sort_order:i}; });
      await q(sb.from('deal_steps').insert(rows));
      reloadSteps(dealId);
    }catch(e){ alert('Could not set up the checklist.\nMake sure the deal-detail SQL has been run in Supabase.\n\n'+(e.message||e)); }
  }
  async function cycleStep(id, dealId, cur){
    var next=STEP_NEXT[cur]||'active';
    try{ await q(sb.from('deal_steps').update({status:next, completed_at: next==='done'?new Date().toISOString():null}).eq('id',id)); reloadSteps(dealId); }
    catch(e){ alert('Could not update step: '+(e.message||e)); }
  }
  async function stepNA(id, dealId, isNA){
    try{ await q(sb.from('deal_steps').update({status: isNA?'pending':'na', completed_at:null}).eq('id',id)); reloadSteps(dealId); }
    catch(e){ alert('Could not update step: '+(e.message||e)); }
  }
  async function stepDue(id, val, dealId){
    try{ await q(sb.from('deal_steps').update({due_date: val||null}).eq('id',id)); reloadSteps(dealId); }
    catch(e){ alert('Could not set due date: '+(e.message||e)); }
  }
  async function stepNote(id, dealId){
    var cur=''; try{ var r=(await q(sb.from('deal_steps').select('notes').eq('id',id).limit(1)))[0]; if(r&&r.notes) cur=r.notes; }catch(e){}
    var note=prompt('Note for this step:', cur);
    if(note===null) return;
    try{ await q(sb.from('deal_steps').update({notes:(note||'').trim()||null}).eq('id',id)); reloadSteps(dealId); }
    catch(e){ alert('Could not save note: '+(e.message||e)); }
  }

  /* ---------- commission editor ---------- */
  function editCommission(dealId){
    var d=deals.filter(function(x){return x.id===dealId;})[0]||{};
    function v(x){ return x==null?'':x; }
    openSheet('<h3>Commission &amp; deal value</h3><div class="ssub">Track the economics and where the fee stands.</div>'
      + '<div class="grid2">'
      + fld('Deal value','<input id="c_val" type="number" step="1000" inputmode="decimal" value="'+v(d.deal_value)+'" placeholder="0">','$ total')
      + fld('Commission','<input id="c_pct" type="number" step="0.1" inputmode="decimal" value="'+v(d.commission_pct)+'" placeholder="0">','%')
      + fld('Commission amount','<input id="c_amt" type="number" step="100" inputmode="decimal" value="'+v(d.commission_amount)+'" placeholder="auto from % if blank">','$')
      + fld('Status','<select id="c_stat"><option value="">— not set —</option>'+selOpts(COMM_STATUS,d.commission_status||'')+'</select>')
      + '</div>'
      + fld('Notes','<textarea id="c_notes" placeholder="e.g. 4% of aggregate rent; split 50/50 with listing side; invoiced on execution">'+esc(d.commission_notes||'')+'</textarea>')
      + '<div class="formerr" id="f_err"></div>'
      + '<div class="srow"><button class="btn" onclick="DF.close()">Cancel</button><button class="btn pri" id="f_save">Save</button></div>');
    $('f_save').addEventListener('click',async function(){
      this.disabled=true; this.textContent='Saving…';
      var val=num($('c_val').value), pct=num($('c_pct').value), amt=num($('c_amt').value);
      if(amt==null && pct!=null && val!=null) amt=Math.round(val*pct/100);
      var patch={deal_value:val, commission_pct:pct, commission_amount:amt, commission_status:($('c_stat').value||null), commission_notes:(($('c_notes').value||'').trim()||null)};
      try{
        await q(sb.from('deals').update(patch).eq('id',dealId).select().single());
        var d2=deals.filter(function(x){return x.id===dealId;})[0]; if(d2) Object.keys(patch).forEach(function(k){ d2[k]=patch[k]; });
        closeSheet(); openDeal(dealId);
      }catch(e){
        var m=e.message||''+e;
        $('f_err').textContent=/column .* does not exist|commission_/i.test(m)?'Run the deal-detail SQL in Supabase first (it adds the commission fields).':m;
        this.disabled=false; this.textContent='Save';
      }
    });
  }

  function fmtDate(d){ if(!d) return '—'; var dt=new Date(d+'T00:00:00'); return isNaN(dt)?esc(d):dt.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); }
  function abstractCard(a, dealId){
    function cell(l,v){ return '<div class="la-cell"><div class="la-l">'+l+'</div><div class="la-v">'+v+'</div></div>'; }
    var kds=(a.key_dates&&a.key_dates.length)?a.key_dates:[];
    var visBtn='<button class="vis '+(a.client_visible?'on':'')+'" onclick="DF.toggleAbstractVisible(\''+a.id+'\','+(a.client_visible?'false':'true')+',\''+dealId+'\')" title="Toggle whether the client sees the lease abstract">'+(a.client_visible?'● Shown to client':'○ Hidden')+'</button>';
    return '<div class="pcard">'
      + '<div class="top"><div><div class="nm">Lease abstract</div>'+((a.tenant_name||a.landlord_name)?'<div class="ad">'+esc(a.tenant_name||'')+(a.landlord_name?' · Landlord: '+esc(a.landlord_name):'')+'</div>':'')+'</div>'
      +   '<div style="display:flex;gap:8px;align-items:center">'+visBtn+'<button class="rev" onclick="DF.editAbstract(\''+dealId+'\')">edit</button></div></div>'
      + '<div class="la-grid">'
      +   cell('Premises', esc(a.premises||'—'))
      +   cell('Size', a.size_sf==null?'—':Number(a.size_sf).toLocaleString()+' SF')
      +   cell('Commencement', fmtDate(a.commencement_date))
      +   cell('Expiration', fmtDate(a.expiration_date))
      +   cell('Base rent', a.base_rent_psf==null?'—':psf(a.base_rent_psf)+'/SF/yr')
      +   cell('Escalations', esc(a.escalations||'—'))
      +   cell('Security deposit', a.security_deposit==null?'—':'$'+Number(a.security_deposit).toLocaleString())
      + '</div>'
      + (a.options?'<div class="la-opts"><div class="la-l">Options</div>'+esc(a.options)+'</div>':'')
      + (kds.length?'<div class="la-kd"><div class="la-l">Critical dates</div>'+kds.map(function(k){return '<div class="la-kdrow"><span>'+esc(k.label||'—')+'</span><b>'+fmtDate(k.date)+'</b></div>';}).join('')+'</div>':'')
      + '</div>';
  }

  function tourCard(s, propById, dealId){
    var when = s.scheduled_at ? new Date(s.scheduled_at).toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : 'Time TBD';
    var name = (s.property_id && propById[s.property_id]) ? propById[s.property_id].name : (s.label||'Tour stop');
    var stLabel = (TOUR_STATUS.filter(function(x){return x[0]===s.status;})[0]||['','—'])[1];
    var visBtn='<button class="vis '+(s.client_visible?'on':'')+'" onclick="DF.toggleTourVisible(\''+s.id+'\','+(s.client_visible?'false':'true')+',\''+dealId+'\')" title="Toggle whether the client sees this stop">'+(s.client_visible?'● Client':'○ Hidden')+'</button>';
    return '<div class="tcard"><div class="tw">'+esc(when)+'</div>'
      + '<div class="tn">'+esc(name)+'</div>'
      + (s.notes?'<div class="tnotes">'+esc(s.notes)+'</div>':'')
      + '<div class="trow"><span class="tag'+(s.status==='toured'?' b':'')+'">'+esc(stLabel)+'</span>'+visBtn
      + '<button class="rev" onclick="DF.editTourStop(\''+s.id+'\',\''+dealId+'\')">edit</button></div></div>';
  }

  function roundRow(r){
    var ge=grossEquiv(r);
    var draft = r.status==='draft' ? '<span class="draftpill">draft</span>' : '';
    return '<tr>'
      + '<td><b class="mono">'+esc(r.round_no)+'</b>'+draft+'</td>'
      + '<td><span class="party '+(r.from_party==='landlord'?'landlord':'tenant')+'">'+(r.from_party==='landlord'?'Landlord':'Tenant')+'</span></td>'
      + '<td>'+esc(basisLabel(r.rent_basis,r.rent_basis_label))+'</td>'
      + '<td class="num">'+psf(r.base_rent_psf)+'</td>'
      + '<td class="num">'+(r.opex_psf==null?'—':psf(r.opex_psf))+'</td>'
      + '<td class="num">'+(ge==null?'—':psf(ge))+'</td>'
      + '<td class="num">'+(r.size_sf==null?'—':Number(r.size_sf).toLocaleString())+'</td>'
      + '<td class="num">'+(r.term_months==null?'—':(r.term_months+'mo'))+'</td>'
      + '<td>'+esc(r.summary||'')+'<button class="rev" onclick="DF.editRound(\''+r.id+'\',\''+r.deal_id+'\')">'+(r.draft_text?'view proposal':(r.status==='draft'?'review':'edit'))+'</button></td>'
      + '</tr>';
  }

  function docsBlock(proposalId, dealId, docs){
    var list=docs.map(function(dc){

  /* ---------- create: round ---------- */
  async function newRound(dealId, proposalId){
    var prior=[];
    try{ prior=await q(sb.from('proposal_rounds').select('*').eq('proposal_id',proposalId).order('round_no',{ascending:false})); }catch(e){}
    var last=prior[0]; var nextNo=last?(last.round_no+1):1;
    openSheet('<h3>Round '+nextNo+'</h3><div class="ssub">Log a set of proposal terms — yours or the landlord\'s response.</div>'
      + roundFields({ rent_basis: last?last.rent_basis:'FSG' })   // carry forward prior structure
      + '<div class="formerr" id="f_err"></div>'
      + '<div class="srow"><button class="btn" onclick="DF.close()">Cancel</button>'
      +   '<button class="btn" id="f_draft">Save as draft</button>'
      +   '<button class="btn pri" id="f_final">Save round</button></div>');
    function save(status){
      var row=Object.assign(readRoundForm(), {deal_id:dealId, proposal_id:proposalId, round_no:nextNo, status:status, source:'manual', created_by:me.id});
      var btn=$(status==='final'?'f_final':'f_draft'); btn.disabled=true; btn.textContent='Saving…';
      q(sb.from('proposal_rounds').insert(row).select().single())
        .then(function(){ closeSheet(); openDeal(dealId); })
        .catch(function(e){ $('f_err').textContent=e.message; btn.disabled=false; btn.textContent=(status==='final'?'Save round':'Save as draft'); });
    }
    $('f_final').addEventListener('click',function(){ save('final'); });
    $('f_draft').addEventListener('click',function(){ save('draft'); });
  }

  /* ---------- edit: round (manual or AI draft) ---------- */
  async function editRound(roundId, dealId){
    var r; try{ r=(await q(sb.from('proposal_rounds').select('*').eq('id',roundId).limit(1)))[0]; }catch(e){ alert('Could not load the round.'); return; }
    if(!r) return;
    _curRound={r:r, dealId:dealId, building:'', address:''};
    try{
      var prx=(await q(sb.from('proposals').select('title,property_id').eq('id',r.proposal_id).limit(1)))[0];
      if(prx){ _curRound.building=prx.title||''; if(prx.property_id){ var px=(await q(sb.from('deal_properties').select('name,address').eq('id',prx.property_id).limit(1)))[0]; if(px){ if(px.name) _curRound.building=px.name; _curRound.address=px.address||''; } } }
    }catch(e){}
    var isDraft=r.status==='draft', hasProse=r.draft_text!=null;
    var draftSec = hasProse ? fld('Proposal'+(r.source==='ai'?' <span class="draftpill">AI-drafted</span>':''),'<textarea id="f_draft_text" style="min-height:190px">'+esc(r.draft_text)+'</textarea>') : '';
    var actionBar = hasProse ? '<div style="display:flex;gap:10px;margin:2px 0 6px;flex-wrap:wrap">'
      + '<button class="btn pri" type="button" onclick="DF.proposalTemplateDl()">⬇ Download in our letterhead</button>'
      + '<button class="btn" type="button" onclick="DF.proposalDocx()">Plain Word</button>'
      + '<button class="btn" type="button" onclick="DF.proposalPdf()">PDF</button>'
      + '<button class="btn" type="button" onclick="DF.copyProposal()">Copy</button></div>'
      + '<div style="font:400 11px Inter;color:var(--ink-faint);margin-bottom:12px">First time, you\'ll pick your firm\'s Word letterhead (.docx with the merge tags) — it\'s remembered after. <a href="#" onclick="DF.clearLetterhead();return false" style="color:var(--accent)">change letterhead</a></div>'
      : '';
    openSheet('<h3>'+(hasProse?'Proposal — round ':'Edit round ')+esc(r.round_no)+(isDraft?' <span class="draftpill">draft</span>':'')+'</h3>'
      + '<div class="ssub">'+(hasProse?'Read it, tweak the wording or terms, then download or copy it to send — or mark it final.':('Adjust the terms'+(isDraft?', then save — or mark it final to make it a real round you can compare and share.':'.')))+'</div>'
      + draftSec + actionBar + roundFields(r)
      + '<div class="formerr" id="f_err"></div>'
      + '<div class="srow"><button class="btn" onclick="DF.close()">Cancel</button>'
      +   '<button class="btn" id="f_del">Delete</button>'
      +   (isDraft ? '<button class="btn" id="f_savedraft">Save draft</button><button class="btn pri" id="f_final">Save &amp; mark final</button>'
                   : '<button class="btn pri" id="f_save">Save changes</button>')
      + '</div>');
    function persist(status, btn){
      var patch=readRoundForm();
      if(status) patch.status=status;
      var dt=$('f_draft_text'); if(dt) patch.draft_text=dt.value;
      btn.disabled=true; var orig=btn.textContent; btn.textContent='Saving…';
      q(sb.from('proposal_rounds').update(patch).eq('id',roundId).select().single())
        .then(function(){ closeSheet(); openDeal(dealId); })
        .catch(function(e){ $('f_err').textContent=e.message; btn.disabled=false; btn.textContent=orig; });
    }
    if(isDraft){
      $('f_savedraft').addEventListener('click',function(){ persist('draft', this); });
      $('f_final').addEventListener('click',function(){ persist('final', this); });
    } else {
      $('f_save').addEventListener('click',function(){ persist(null, this); });
    }
    $('f_del').addEventListener('click',async function(){
      if(!confirm('Delete this round?')) return;
      try{ await q(sb.from('proposal_rounds').delete().eq('id',roundId)); closeSheet(); openDeal(dealId); }
      catch(e){ $('f_err').textContent=e.message; }
    });
  }

  /* ---------- proposal document export (PDF / copy) ---------- */
  function downloadProposalPdf(text, title){
    var w=window.open('', '_blank');
    if(!w){ alert('Allow pop-ups for this site, then try Download again.'); return; }
    var bodyHtml = window.marked ? window.marked.parse(text||'') : '<pre style="white-space:pre-wrap;font-family:Georgia,serif">'+esc(text||'')+'</pre>';
    w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(title||'Proposal')+'</title>'
      + '<style>body{font:13.5px/1.65 Georgia,"Times New Roman",serif;color:#1A2230;max-width:7.4in;margin:0 auto;padding:0.7in 0.25in}'
      + 'h1,h2,h3{font-family:Helvetica,Arial,sans-serif;color:#1B2A4A;line-height:1.2}h1{font-size:20px;margin:0 0 12px}h2{font-size:15.5px;margin:18px 0 6px}h3{font-size:13px;margin:14px 0 4px}'
      + 'p{margin:0 0 10px}ul,ol{margin:0 0 10px 18px}li{margin:2px 0}strong{color:#1B2A4A}'
      + 'table{border-collapse:collapse;width:100%;margin:8px 0}td,th{border:1px solid #D2CCBF;padding:6px 9px;text-align:left;font-size:12.5px}th{background:#F4F1EA}'
      + '</style></head><body>'+bodyHtml+'</body></html>');
    w.document.close();
    setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 350);
  }
  function safeName(s){ return (s||'').replace(/[\\/:*?"<>|\n\r\t]/g,' ').replace(/\s+/g,' ').trim(); }
  function todayStamp(){ var dt=new Date(); return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2); }
  function proposalFilename(){
    var d=_curRound?deals.filter(function(x){return x.id===_curRound.dealId;})[0]:null;
    var client=safeName((d&&d.client_name)||'')||'Proposal';
    var addr=safeName((_curRound&&(_curRound.address||_curRound.building))||'');
    var parts=[client+' Proposal']; if(addr) parts.push(addr); parts.push(todayStamp());
    return safeName(parts.join(' - '));
  }
  function proposalPdf(){ var el=$('f_draft_text'); downloadProposalPdf(el?el.value:'', proposalFilename()); }
  function downloadProposalDocx(text, filename){
    if(!window.htmlDocx){ alert('The Word exporter is still loading — give it a second and try again.'); return; }
    var inner = window.marked ? window.marked.parse(text||'') : '<pre>'+esc(text||'')+'</pre>';
    var html = '<!doctype html><html><head><meta charset="utf-8"><style>'
      + 'body{font-family:Georgia,"Times New Roman",serif;font-size:11pt;color:#1A2230;line-height:1.5}'
      + 'h1,h2,h3{font-family:Arial,Helvetica,sans-serif;color:#1B2A4A}h1{font-size:16pt}h2{font-size:13pt}h3{font-size:11.5pt}'
      + 'table{border-collapse:collapse}td,th{border:1px solid #999999;padding:4px 8px}th{background:#F4F1EA}'
      + '</style></head><body>'+inner+'</body></html>';
    try{
      var blob = window.htmlDocx.asBlob(html);
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=url; a.download=(filename||'Proposal')+'.docx';
      document.body.appendChild(a); a.click();
      aiToast('Saved “'+(filename||'Proposal')+'.docx” to your Downloads.');
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
    }catch(e){ alert('Could not build the Word file: '+(e.message||e)); }
  }
  function proposalDocx(){ var el=$('f_draft_text'); downloadProposalDocx(el?el.value:'', proposalFilename()); }

  /* ---- firm letterhead (.docx template merge via docxtemplater) ---- */
  function getLetterhead(){
    var b64=null; try{ b64=localStorage.getItem('vantage_letterhead_docx'); }catch(e){}
    if(!b64) return null;
    try{ var bin=atob(b64), len=bin.length, bytes=new Uint8Array(len); for(var i=0;i<len;i++) bytes[i]=bin.charCodeAt(i); return bytes.buffer; }catch(e){ return null; }
  }
  function pickLetterhead(){
    return new Promise(function(res){
      var inp=document.createElement('input'); inp.type='file'; inp.accept='.docx';
      inp.onchange=function(){
        var f=inp.files&&inp.files[0]; if(!f){ res(null); return; }
        var rd=new FileReader();
        rd.onload=function(){
          var ab=rd.result;
          try{ var bytes=new Uint8Array(ab), bin=''; for(var i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
               localStorage.setItem('vantage_letterhead_docx', btoa(bin)); localStorage.setItem('vantage_letterhead_name', f.name); }catch(e){}
          res(ab);
        };
        rd.readAsArrayBuffer(f);
      };
      inp.click();
    });
  }
  function clearLetterhead(){
    try{ localStorage.removeItem('vantage_letterhead_docx'); localStorage.removeItem('vantage_letterhead_name'); }catch(e){}
    aiToast('Letterhead cleared — you\'ll be asked to pick it next time you download in the firm template.');
  }
  function buildMergeData(r, d, bldg, body){
    function s(x){ return x==null?'':String(x); }
    var base=r.base_rent_psf, opex=r.opex_psf;
    return {
      date: new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'}),
      broker: (me&&me.email)||'',
      client: s(d&&d.client_name), tenant: s(d&&d.client_name),
      building: s(bldg),
      rent_structure: basisLabel(r.rent_basis, r.rent_basis_label),
      base_rent: base==null?'':('$'+Number(base).toFixed(2)),
      opex: opex==null?'':('$'+Number(opex).toFixed(2)),
      gross_rent: base==null?'':('$'+(Number(base)+(Number(opex)||0)).toFixed(2)),
      size_sf: r.size_sf==null?'':Number(r.size_sf).toLocaleString(),
      term_months: r.term_months==null?'':String(r.term_months),
      term_years: r.term_months==null?'':(r.term_months/12).toFixed(1),
      escalation: r.annual_escalation_pct==null?'':(Number(r.annual_escalation_pct).toFixed(1)+'%'),
      free_rent: r.free_rent_months==null?'':String(r.free_rent_months),
      ti: r.ti_psf==null?'':('$'+Number(r.ti_psf).toFixed(2)),
      notes: s(r.summary),
      proposal_body: s(body!=null?body:r.draft_text)
    };
  }
  function fillTemplateDocx(ab, data, filename){
    var DT = window.docxtemplater || window.Docxtemplater;
    if(!window.PizZip || !DT){ alert('The Word template engine is still loading — give it a second and try again.'); return; }
    try{
      var zip=new window.PizZip(ab);
      var doc=new DT(zip, {paragraphLoop:true, linebreaks:true, nullGetter:function(){ return ''; }});
      doc.render(data);
      var out=doc.getZip().generate({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      var url=URL.createObjectURL(out);
      var a=document.createElement('a'); a.href=url; a.download=(filename||'Proposal')+'.docx';
      document.body.appendChild(a); a.click();
      aiToast('Saved “'+(filename||'Proposal')+'.docx” to your Downloads.');
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
    }catch(e){
      var msg=e.message||(''+e);
      if(e.properties && e.properties.errors){ msg=e.properties.errors.map(function(x){ return (x.properties&&x.properties.explanation)||''; }).filter(Boolean).join('; ')||msg; }
      alert('Could not fill the letterhead template:\n'+msg+'\n\nCheck that your .docx uses the {merge tags} from the template guide.');
    }
  }
  async function proposalTemplateDl(){
    if(!_curRound) return;
    var r=_curRound.r, dealId=_curRound.dealId, d=deals.filter(function(x){return x.id===dealId;})[0];
    var bodyEl=$('f_draft_text'), data=buildMergeData(r, d, _curRound.building, bodyEl?bodyEl.value:r.draft_text);
    var ab=getLetterhead();
    if(!ab){ aiToast('Pick your firm\'s Word letterhead (.docx) — I\'ll remember it for next time.'); ab=await pickLetterhead(); if(!ab) return; }
    fillTemplateDocx(ab, data, proposalFilename());
  }
  function copyProposal(){
    var el=$('f_draft_text'); var t=el?el.value:'';
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(function(){ aiToast('Copied — paste it into Word or your email.'); })
        .catch(function(){ alert('Could not copy automatically — select the text in the box and copy it manually.'); });
    } else { alert('Copy isn\'t supported in this browser — select the text in the box and copy it manually.'); }
  }

  function tourFields(props, v){
    v=v||{};
    var propOpts='<option value="">— other / no building —</option>'+props.map(function(p){ return '<option value="'+p.id+'"'+(v.property_id===p.id?' selected':'')+'>'+esc(p.name)+'</option>'; }).join('');

        if(pick){

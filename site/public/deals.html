  /* ---------- side-by-side compare ---------- */
  var _cmp=null;
  async function openCompare(dealId){
    var d=deals.filter(function(x){return x.id===dealId;})[0]; if(!d) return;
    $('pipelineView').style.display='none';
    var v=$('dealView'); v.style.display='block';
    $('crumb').innerHTML='Deal flow <b>›</b> '+esc(d.client_name||'Deal')+' <b>›</b> Compare';
    v.innerHTML='<div class="loading">Building comparison…</div>';
    try{
      var props=await q(sb.from('deal_properties').select('id,name').eq('deal_id',dealId));
      var proposals=await q(sb.from('proposals').select('*').eq('deal_id',dealId).order('created_at'));
      var rounds=await q(sb.from('proposal_rounds').select('*').eq('deal_id',dealId).order('round_no'));
      var propById={}; props.forEach(function(p){ propById[p.id]=p; });
      var byProp={}; rounds.forEach(function(r){ (byProp[r.proposal_id]=byProp[r.proposal_id]||[]).push(r); });
      var cols=proposals.filter(function(pr){ return (byProp[pr.id]||[]).length; }).map(function(pr){
        var rs=byProp[pr.id];
        return { proposal:pr, building:(pr.property_id&&propById[pr.property_id])?propById[pr.property_id].name:null,
                 rounds:rs, selId:rs[rs.length-1].id };
      });
      _cmp={dealId:dealId, deal:d, cols:cols};
      renderCompare();
    }catch(e){ v.innerHTML='<div class="loading">Could not build comparison: '+esc(e.message)+'</div>'; }
  }

  function cmpRound(i, roundId){ if(_cmp&&_cmp.cols[i]){ _cmp.cols[i].selId=roundId; renderCompare(); } }

  function renderCompare(){
    var c=_cmp; if(!c) return;
    var v=$('dealView');
    var back='<button class="dsr-back" style="margin-bottom:14px" onclick="DF.openDeal(\''+c.dealId+'\')">‹ Back to deal</button>';
    if(!c.cols.length){
      v.innerHTML=back+'<div class="dealhead"><div><h1>'+esc(c.deal.client_name||'Deal')+' — compare</h1></div></div>'
        +'<div class="loading">No proposals with rounds yet. Add proposal terms first, then compare.</div>';
      return;
    }
    var sel=c.cols.map(function(col){ return col.rounds.filter(function(r){return r.id===col.selId;})[0]||col.rounds[col.rounds.length-1]; });
    var eff=sel.map(effectiveRent);
    var bestIdx=-1, bestVal=Infinity;
    eff.forEach(function(x,i){ if(x&&x.netEff<bestVal){ bestVal=x.netEff; bestIdx=i; } });

    function row(label,cells,cls){
      return '<tr'+(cls?' class="'+cls+'"':'')+'><td class="rl">'+label+'</td>'+cells.map(function(x){return '<td>'+x+'</td>';}).join('')+'</tr>';
    }
    function fmtTerm(r){ return r.term_months==null?'—':(r.term_months+' mo · '+(r.term_months/12).toFixed(1)+' yr'); }

    var headCells=c.cols.map(function(col,i){
      var opts=col.rounds.map(function(r){
        return '<option value="'+r.id+'"'+(r.id===col.selId?' selected':'')+'>Round '+r.round_no+(r.from_party==='landlord'?' · LL':' · us')+(r.status==='draft'?' (draft)':'')+'</option>';
      }).join('');
      return '<th class="colh">'+esc(col.proposal.title||'Proposal')
        +(col.building?'<div class="ad">'+esc(col.building)+'</div>':'')
        +'<select onchange="DF.cmpRound('+i+',this.value)">'+opts+'</select></th>';
    }).join('');

    var neCells=sel.map(function(r,i){
      if(!eff[i]) return '<td class="num">—<div class="sub2">needs base + term</div></td>';
      return '<td'+(i===bestIdx?' class="best"':'')+'><span class="ne-val">'+psf(eff[i].netEff)+'</span>'
        +(i===bestIdx?'<span class="bestbadge">Best</span>':'')+'<div class="sub2">$/SF/yr gross-equiv</div></td>';
    }).join('');
    var neRow='<tr class="ne"><td class="rl">Net effective rent</td>'+neCells+'</tr>';

    var body=''
      + row('Building', sel.map(function(r,i){ return esc(c.cols[i].building||'—'); }))
      + row('Rent structure', sel.map(function(r){ return esc(basisLabel(r.rent_basis,r.rent_basis_label)); }))
      + row('Size', sel.map(function(r){ return '<span class="num">'+(r.size_sf==null?'—':Number(r.size_sf).toLocaleString()+' SF')+'</span>'; }))
      + row('Term', sel.map(function(r){ return '<span class="num">'+fmtTerm(r)+'</span>'; }))
      + row('Starting base', sel.map(function(r){ return '<span class="num">'+psf(r.base_rent_psf)+'</span>'; }))
      + row('Opex / NNN load', sel.map(function(r){ return '<span class="num">'+(r.opex_psf==null?'—':psf(r.opex_psf))+'</span>'; }))
      + row('Gross-equiv start', sel.map(function(r,i){ return '<span class="num">'+(eff[i]?psf(eff[i].grossStart):'—')+'</span>'; }))
      + row('Annual escalation', sel.map(function(r){ return '<span class="num">'+(r.annual_escalation_pct==null?'—':Number(r.annual_escalation_pct).toFixed(1)+'%')+'</span>'; }))
      + row('Free rent', sel.map(function(r){ return '<span class="num">'+(r.free_rent_months==null?'—':r.free_rent_months+' mo')+'</span>'; }))
      + row('TI allowance', sel.map(function(r){ return '<span class="num">'+(r.ti_psf==null?'—':psf(r.ti_psf))+'</span>'; }))
      + neRow
      + row('Total cost / term', sel.map(function(r,i){
          if(!eff[i]||r.size_sf==null) return '<span class="num">—</span>';
          return '<span class="num">$'+Math.round(eff[i].costPerSF*Number(r.size_sf)).toLocaleString()+'</span>';
        }));

    v.innerHTML = back
      + '<div class="dealhead"><div><h1>'+esc(c.deal.client_name||'Deal')+' — compare</h1>'
      +   '<div class="meta">Side-by-side economics, normalized to a gross-equivalent net effective rent.</div></div></div>'
      + '<div class="cmpwrap"><table class="cmp"><thead><tr><th class="rl"></th>'+headCells+'</tr></thead><tbody>'+body+'</tbody></table></div>'
      + '<div class="cmpnote"><b>How net effective rent is figured:</b> gross-equivalent start = base + opex '
      +   '(opex = the pass-through paid on top of base — leave blank for full-service). Base rent escalates annually by the '
      +   'escalation %, opex is held flat. Free rent abates base rent only. The TI allowance is credited up front. The total is '
      +   'spread over the term to one $/SF/yr — the number that compares full-service, modified-gross, and NNN deals fairly. '
      +   'Lowest wins. Switch any column\'s round to compare at a given point in the negotiation.</div>';
  }

  async function shareDeal(dealId){
    var d=deals.filter(function(x){return x.id===dealId;})[0]; if(!d) return;
    openSheet('<h3>Share with client</h3><div class="ssub">Create a private, read-only link. The client opens it with a passcode — no login. They see only the buildings and proposals you mark “Shown to client”.</div>'
      + fld('Passcode','<input id="f_pass" placeholder="choose a passcode (min 4 chars)" autofocus>')
      + (d.slug?'<div class="ge">A link already exists for this deal. Saving keeps the same link and updates the passcode.</div>':'')
      + '<div id="f_linkout"></div>'
      + '<div class="formerr" id="f_err"></div>'
      + '<div class="srow"><button class="btn" onclick="DF.close()">Close</button><button class="btn pri" id="f_save">Save &amp; get link</button></div>');
    $('f_save').addEventListener('click',async function(){
      var pass=($('f_pass').value||'').trim();

  function attachLeaseDoc(dealId, abstractId){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='.pdf,.doc,.docx';
    inp.onchange=async function(){
      var file=inp.files&&inp.files[0]; if(!file) return;
      if(file.size>15*1024*1024){ alert('File too large — 15MB max.'); return; }
      var safe=file.name.replace(/[^A-Za-z0-9._-]/g,'_'); var path=dealId+'/'+randSlug(8)+'_'+safe;
      try{
        var up=await sb.storage.from('deal-files').upload(path, file, {upsert:false, contentType:file.type||undefined});
        if(up.error) throw up.error;
        await q(sb.from('documents').insert({deal_id:dealId, proposal_id:null, abstract_id:abstractId||null, kind:'lease',
          filename:file.name, storage_path:path, mime:file.type||null, size_bytes:file.size, uploaded_by:me.id}).select().single());
        openDeal(dealId);
      }catch(e){ alert('Upload failed: '+(e.message||e)); }
    };
    inp.click();
  }
  function attachDoc(proposalId, dealId){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='.pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg';
    inp.onchange=async function(){
      var file=inp.files&&inp.files[0]; if(!file) return;
      if(file.size>15*1024*1024){ alert('File too large — 15MB max.'); return; }
      var safe=file.name.replace(/[^A-Za-z0-9._-]/g,'_');
      var path=dealId+'/'+randSlug(8)+'_'+safe;       // first folder = deal_id → storage RLS scopes by it
      try{
        var up=await sb.storage.from('deal-files').upload(path, file, {upsert:false, contentType:file.type||undefined});
        if(up.error) throw up.error;
        await q(sb.from('documents').insert({deal_id:dealId, proposal_id:proposalId, kind:'proposal',
          filename:file.name, storage_path:path, mime:file.type||null, size_bytes:file.size, uploaded_by:me.id}).select().single());
        openDeal(dealId);
      }catch(e){ alert('Upload failed: '+(e.message||e)); }
    };
    inp.click();
  }
  async function downloadDoc(path){

  async function deleteDoc(docId, path, dealId){
    if(!confirm('Remove this file? This cannot be undone.')) return;
    try{
      await sb.storage.from('deal-files').remove([path]);     // ignore storage error (row is source of truth)
      await q(sb.from('documents').delete().eq('id',docId));

  function mGet(o,path){ var p=path.split('.'), c=o; for(var i=0;i<p.length;i++){ if(c==null) return undefined; c=c[p[i]]; } return c; }
  function mSet(o,path,v){ var p=path.split('.'), c=o; for(var i=0;i<p.length-1;i++){ if(c[p[i]]==null) c[p[i]]={}; c=c[p[i]]; } c[p[p.length-1]]=v; }
  function optSeed(name,side,structure){ return { id:'o'+(++_optSeq)+'_'+Math.floor(Math.random()*1e6), name:name, side:side, structure:structure, sizeMode:'fixed', rsf:10000, termMonths:60, baseRentPSFmo:0, rentEscalationPct:3, opexBasePSFmo:0, opexGrowthPct:3, freeRentMonths:0, tiPSF:0, parking:{ratioPer1000:0,monthlyRate:0,escalationPct:3}, oneTime:{movingPSF:0,cablingPSF:0,ffnePSF:0}, makeGood:{on:false,psf:0} }; }

  function modelKey(dealId){ return 'vantage_model_'+dealId; }
  function migrateOpt(o){ // upgrade old annual/RSF-year models to monthly ($/SF/mo, term in months)
    if(!o.id) o.id='o'+(++_optSeq)+'_'+Math.floor(Math.random()*1e6);
    if(o.termMonths==null) o.termMonths = o.termYears!=null ? Math.round(o.termYears*12) : 60;
    if(o.baseRentPSFmo==null) o.baseRentPSFmo = o.baseRentPSF!=null ? Math.round((o.baseRentPSF/12)*100)/100 : 0;
    if(o.opexBasePSFmo==null) o.opexBasePSFmo = o.opexBasePSF!=null ? Math.round((o.opexBasePSF/12)*100)/100 : 0;
    delete o.termYears; delete o.baseRentPSF; delete o.opexBasePSF; return o;
  }
  function loadModel(dealId){ try{ var raw=localStorage.getItem(modelKey(dealId)); if(raw){ var m=JSON.parse(raw); if(m&&m.options&&m.options.length){ m.options.forEach(migrateOpt); return m; } } }catch(e){} return defaultModel(); }

    refreshOutputs();

  function refreshOutputs(){
    if(!_model||!window.VModel) return;
    var runs=_model.options.map(function(o){ return VModel.runOption(mergeDeal(o)); });
    var bestNpv=null, bestIdx=-1;
    runs.forEach(function(r,i){ if(bestNpv==null||r.base.npv<bestNpv){ bestNpv=r.base.npv; bestIdx=i; } });
    runs.forEach(function(r,i){
      var o=_model.options[i];
      setTxt('mo_'+o.id+'_neteff', psf(r.base.netEffectivePSFmo)+'/SF/mo');
      setTxt('mo_'+o.id+'_allin', money(r.base.allIn));
      var npvCell=$('mo_'+o.id+'_npv'); if(npvCell){ npvCell.textContent=money(r.base.npv); npvCell.className='mval big npv'+(i===bestIdx&&runs.length>1?' best':''); }
      setTxt('mo_'+o.id+'_band', money(r.bands.low.npv)+' – '+money(r.bands.high.npv));
      var sz=r.base.rsf.toLocaleString()+' RSF'+(o.sizeMode==='byHeadcount'?' (sized)':'')+(r.base.shortfallSF>0?(' · ⚠ short '+r.base.shortfallSF.toLocaleString()+' SF'):'');

  function setTxt(id,t){ var e=$(id); if(e) e.textContent=t; }
  function modelInput(optId,path,value,isNum){ var o=_model.options.filter(function(x){return x.id===optId;})[0]; if(!o) return; mSet(o,path, isNum?(value===''?0:Number(value)):value); saveModel(); if(path==='side'){ renderModel(); return; } refreshOutputs(); }

    return [ o('Renew in place','stay','FSG',{}), o('Relocate option','go','NNN',{}) ];

  /* ---- Phase 5: pre-populate from the deal's proposals + lease abstract ---- */
  async function modelPull(){
    var dealId=_modelDeal;
    var proposals=[], rounds=[], props=[], abst=null;
    try{ proposals=await q(sb.from('proposals').select('id,title,property_id,status').eq('deal_id',dealId).order('created_at')); }catch(e){}
    try{ rounds=await q(sb.from('proposal_rounds').select('*').eq('deal_id',dealId).eq('status','final').order('round_no')); }catch(e){}
    try{ props=await q(sb.from('deal_properties').select('id,name').eq('deal_id',dealId)); }catch(e){}
    try{ var a=await q(sb.from('lease_abstracts').select('*').eq('deal_id',dealId).limit(1)); abst=a&&a[0]; }catch(e){}
    var propName={}; props.forEach(function(p){ propName[p.id]=p.name; });
    var opts=[];
    if(abst){
      var termY=5;
      if(abst.commencement_date&&abst.expiration_date){ var c=new Date(abst.commencement_date), e=new Date(abst.expiration_date); var yr=Math.round((e-c)/(365.25*86400000)); if(yr>0) termY=yr; }
      opts.push(Object.assign(optSeed('Renew in place','stay','FSG'), { rsf:num(abst.size_sf)||10000, baseRentPSFmo:Math.round(((num(abst.base_rent_psf)||0)/12)*100)/100, termMonths:termY*12 }));
    }
    var best={}; rounds.forEach(function(r){ var b=best[r.proposal_id]; if(!b||r.round_no>b.round_no) best[r.proposal_id]=r; });
    proposals.forEach(function(pr){
      var r=best[pr.id]; if(!r) return;
      var name=(pr.property_id&&propName[pr.property_id])||pr.title||'Proposal';
      var nnn=['NNN','NN','N','ABS'].indexOf(r.rent_basis)>=0;
      opts.push(Object.assign(optSeed(name,'go',nnn?'NNN':'FSG'), {
        rsf:num(r.size_sf)||10000, termMonths:num(r.term_months)||60,
        baseRentPSFmo:Math.round(((num(r.base_rent_psf)||0)/12)*100)/100, opexBasePSFmo:Math.round(((num(r.opex_psf)||0)/12)*100)/100,
        rentEscalationPct:num(r.annual_escalation_pct)||3, freeRentMonths:num(r.free_rent_months)||0, tiPSF:num(r.ti_psf)||0
      }));
    });
    if(!opts.length){ alert('Nothing to pull yet. Add a lease abstract or some proposal rounds to this deal, then pull.'); return; }
    if(!confirm('Pull '+opts.length+' option'+(opts.length>1?'s':'')+' from '+(abst?'the lease abstract + ':'')+'this deal\'s proposals? This replaces the current options.')) return;
    _model.options=opts; saveModel(); renderModel();
  }

  function computeRuns(){ return _model.options.map(function(o){ return VModel.runOption(mergeDeal(o)); }); }
  function round4(v){ return Math.round((v+Number.EPSILON)*10000)/10000; }

  /* ---- branded PDF (Havill letterhead, print-to-PDF) ---- */
  function modelPdf(){
    if(!_model) return;
    var d=deals.filter(function(x){return x.id===_modelDeal;})[0];
    var client=esc((d&&d.client_name)||'Client');
    var runs=computeRuns();
    var bestNpv=Math.min.apply(null, runs.map(function(r){return r.base.npv;}));
    var stay=null,go=null; runs.forEach(function(r){ if(r.side==='stay'&&!stay)stay=r; if(r.side==='go'&&!go)go=r; });
    var rec=''; if(stay&&go){ var dN=go.base.npv-stay.base.npv; rec='<div class="rec"><b>'+(dN<0?'Relocating':'Renewing in place')+'</b> is the lower-NPV path by <b>'+money(Math.abs(dN))+'</b> over the term (base case) — Stay '+money(stay.base.npv)+' vs Go '+money(go.base.npv)+'.</div>'; }
    function cell(v,best){ return '<td'+(best?' class="best"':'')+'>'+v+'</td>'; }
    var head='<th></th>'+runs.map(function(r){return '<th>'+esc(r.input.name)+'<div class="s">'+(r.side==='stay'?'Stay':'Go')+' · '+r.structure+'</div></th>';}).join('');
    var rows=''
      +'<tr><td class="l">Net effective ($/SF/mo)</td>'+runs.map(function(r){return cell(psf(r.base.netEffectivePSFmo)+'/SF/mo');}).join('')+'</tr>'
      +'<tr class="b"><td class="l">All-in ($, whole term)</td>'+runs.map(function(r){return cell(money(r.base.allIn));}).join('')+'</tr>'
      +'<tr class="b"><td class="l">NPV ($)</td>'+runs.map(function(r){return cell(money(r.base.npv), r.base.npv===bestNpv&&runs.length>1);}).join('')+'</tr>'
      +'<tr><td class="l">NPV band (low–high)</td>'+runs.map(function(r){return cell(money(r.bands.low.npv)+' – '+money(r.bands.high.npv));}).join('')+'</tr>'
      +'<tr><td class="l">Size</td>'+runs.map(function(r){return cell(r.base.rsf.toLocaleString()+' RSF');}).join('')+'</tr>'
      +'<tr><td class="l">Term</td>'+runs.map(function(r){return cell(r.termMonths+' months');}).join('')+'</tr>';
    var arows=MODEL_ROWS.filter(function(x){return !x.sec;}).map(function(rw){
      return '<tr><td class="l">'+rw.label+(rw.unit?' <span class="u">'+rw.unit+'</span>':'')+'</td>'+_model.options.map(function(o){
        var v = rw.type==='makegood' ? ((o.makeGood&&o.makeGood.on)?('$'+mGet(o,'makeGood.psf')+' on'):'—') : mGet(o,rw.k);
        return '<td>'+esc(v==null?'':v)+'</td>';
      }).join('')+'</tr>';
    }).join('');
    var scheds=runs.map(function(r){
      var yr=r.base.byYear.map(function(y){ return '<tr><td>'+y.year+'</td><td>'+psf(y.baseStartPSFmo)+'</td><td>'+money(y.tenantPays)+'</td><td>'+money(y.parking)+'</td><td>'+money(y.recurring)+'</td><td>'+money(y.pv)+'</td></tr>'; }).join('');
      return '<div class="sched"><h3>'+esc(r.input.name)+' — by lease year</h3><table class="yr"><thead><tr><th>Yr</th><th>Base $/SF/mo</th><th>Tenant $ (yr)</th><th>Parking $ (yr)</th><th>Recurring $ (yr)</th><th>PV $</th></tr></thead><tbody>'+yr
        +'<tr class="tot"><td colspan="4">Upfront (one-time + make-good − TI) · NPV</td><td>'+money(r.base.upfront)+'</td><td>'+money(r.base.npv)+'</td></tr></tbody></table></div>';
    }).join('');
    var dr=_model.discountRatePct;
    var html='<!doctype html><html><head><meta charset="utf-8"><title>Occupancy Analysis — '+client+'</title><style>'
      +'*{box-sizing:border-box}body{font:12px/1.5 Arial,Helvetica,sans-serif;color:#1A2230;margin:0;padding:40px 44px}'
      +'.lh{border-bottom:2px solid #D2CCBF;padding-bottom:10px;margin-bottom:18px}'
      +'.lh .n{font:800 22px Georgia,serif;color:#1B2A4A;letter-spacing:.5px}.lh .t{font:11px Arial;color:#55606F;letter-spacing:2px;margin-top:2px}'
      +'h1{font:700 17px Georgia,serif;color:#1B2A4A;margin:0 0 2px}.date{color:#8A92A0;font-size:11px;margin-bottom:14px}'
      +'.rec{border:1px solid #cdd6df;border-left:4px solid #2D6E7E;background:#f6f8f9;padding:9px 12px;border-radius:6px;margin-bottom:16px;font-size:12.5px}'
      +'table{border-collapse:collapse;width:100%;margin-bottom:8px}'
      +'.cmp th,.cmp td{border:1px solid #e2ddd2;padding:7px 10px;text-align:right;font-variant-numeric:tabular-nums}'
      +'.cmp thead th{background:#1B2A4A;color:#fff;text-align:right;font-weight:600}.cmp thead th .s{font-weight:400;font-size:9.5px;color:#cfd6e0;text-align:right}'
      +'.cmp td.l,.cmp th:first-child{text-align:left}.cmp .l{background:#faf9f6;font-weight:600;color:#55606F}'
      +'.cmp tr.b td{font-size:13px;font-weight:700}.cmp td.best{background:#2D6E7E;color:#fff;border-color:#2D6E7E}'
      +'h2{font:700 12px Arial;color:#1B2A4A;text-transform:uppercase;letter-spacing:.06em;margin:22px 0 6px;border-bottom:1px solid #e2ddd2;padding-bottom:4px}'
      +'.asm th,.asm td{border:1px solid #e9e4d9;padding:4px 8px;text-align:right;font-size:10.5px}.asm td.l{text-align:left;color:#55606F}.asm .u{color:#a7adb6;font-size:9px}'
      +'.sched{page-break-inside:avoid;margin-top:14px}.sched h3{font:700 11px Arial;color:#1B2A4A;margin:0 0 4px}'
      +'.yr th,.yr td{border:1px solid #e9e4d9;padding:3px 7px;text-align:right;font-size:10px}.yr thead th{background:#f0eee7}.yr .tot td{font-weight:700;background:#faf9f6}'
      +'.ft{margin-top:26px;border-top:1px solid #D2CCBF;padding-top:8px;color:#8A92A0;font-size:10px;text-align:center}'
      +'@media print{body{padding:22px}}'
      +'</style></head><body>'
      +'<div class="lh"><div class="n">HAVILL &amp; CO.</div><div class="t">COMMERCIAL REAL ESTATE · TENANT REPRESENTATION</div></div>'
      +'<h1>Occupancy Cost Analysis — '+client+'</h1><div class="date">Prepared '+new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})+' · Discount rate '+dr+'%</div>'
      +rec
      +'<table class="cmp"><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table>'
      +'<h2>Assumptions</h2><table class="asm"><thead><tr><th class="l">Assumption</th>'+_model.options.map(function(o){return '<th>'+esc(o.name)+'</th>';}).join('')+'</tr></thead><tbody>'+arows+'</tbody></table>'
      +'<h2>Year-by-year schedules</h2>'+scheds
      +'<div class="ft">Prepared by Havill &amp; Co. · Confidential &amp; proprietary · Net effective is gross-equivalent rent net of concessions; NPV discounts all-in cost at '+dr+'% (rent-in-advance).</div>'
      +'</body></html>';
    var w=window.open('','_blank'); if(!w){ alert('Please allow pop-ups to generate the PDF.'); return; }
    w.document.write(html); w.document.close(); w.focus(); setTimeout(function(){ try{ w.print(); }catch(e){} }, 350);
  }

  /* ---- full-model Excel (SheetJS) ---- */
  function modelExcel(){
    if(!window.XLSX){ alert('The Excel library is still loading — try again in a second.'); return; }
    if(!_model) return;
    var d=deals.filter(function(x){return x.id===_modelDeal;})[0];
    var client=((d&&d.client_name)||'Client');
    var runs=computeRuns();
    var wb=XLSX.utils.book_new();
    var sum=[['Occupancy Cost Analysis — '+client],['Prepared '+new Date().toLocaleDateString()+' · Havill & Co.'],[],
      ['Option','Side','Structure','Size (RSF)','Term (months)','Net Eff $/SF/mo','Net Eff $/SF/yr','All-in $ (term)','NPV','NPV low','NPV high']];
    runs.forEach(function(r){ var o=r.input; sum.push([o.name,o.side,r.structure,r.base.rsf,r.termMonths, VModel.round2(r.base.netEffectivePSFmo), VModel.round2(r.base.netEffectivePSFyr), Math.round(r.base.allIn), Math.round(r.base.npv), Math.round(r.bands.low.npv), Math.round(r.bands.high.npv)]); });
    sum.push([]); sum.push(['Discount rate (%)',_model.discountRatePct,'Headcount',_model.headcountStart,'Density (usf/emp)',_model.densityUsfPerEmp,'Load',_model.loadFactor,'Growth L/B/H (%)',_model.growth.low+'/'+_model.growth.base+'/'+_model.growth.high]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sum), 'Summary');

    var asRows=[['Assumption'].concat(runs.map(function(r){return r.input.name;}))];
    MODEL_ROWS.forEach(function(rw){ if(rw.sec){ asRows.push([rw.sec]); return; } asRows.push([rw.label+(rw.unit?' ('+rw.unit+')':'')].concat(_model.options.map(function(o){ return rw.type==='makegood'? ((o.makeGood&&o.makeGood.on)?('ON '+mGet(o,'makeGood.psf')):'off') : mGet(o,rw.k); }))); });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(asRows), 'Assumptions');

    runs.forEach(function(r,i){
      var rows=[['Month','Lease yr','Base $/SF/mo','Opex $/SF/mo','Tenant $','Parking $','Recurring $','Discount factor','PV $']];
      r.base.months.forEach(function(y){ rows.push([y.m, y.ly+1, VModel.round2(y.baseAfterFreePSFmo), VModel.round2(y.opexTenantPSFmo), Math.round(y.tenantPays), Math.round(y.parking), Math.round(y.recurring), round4(y.df), Math.round(y.recurring*y.df)]); });
      rows.push([]);
      rows.push(['Upfront (one-time + make-good − TI)','','','','','','','', Math.round(r.base.upfront)]);
      rows.push(['All-in (nominal)','','','','','','','', Math.round(r.base.allIn)]);
      rows.push(['NPV','','','','','','','', Math.round(r.base.npv)]);
      rows.push(['Net effective $/SF/mo','','','','','','','', VModel.round2(r.base.netEffectivePSFmo)]);
      var nm=((r.input.name||('Option'+(i+1))).replace(/[\\/?*\[\]:]/g,' ').trim().slice(0,26))+' '+(i+1);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), nm.slice(0,31));
    });
    XLSX.writeFile(wb, safeName(client+' Occupancy Model - '+todayStamp())+'.xlsx');
  }

  return {
    openModel:openModel, modelInput:modelInput, modelToggle:modelToggle, modelDeal:modelDeal, modelAdd:modelAdd, modelRemove:modelRemove, modelPrint:modelPrint, modelPdf:modelPdf, modelExcel:modelExcel, modelScenario:modelScenario, modelPull:modelPull,
    showDashboard:showDashboard, showPipeline:showPipeline, setPipeView:setPipeView, openDeal:openDeal, openCompare:openCompare, cmpRound:cmpRound, toggleClosed:toggleClosed,
    editCommission:editCommission, seedSteps:seedSteps, cycleStep:cycleStep, stepDue:stepDue, stepNote:stepNote, stepNA:stepNA,
    newTask:newTask, toggleTask:toggleTask, deleteTask:deleteTask,
    newDeal:newDeal, newProperty:newProperty, newProposal:newProposal, newRound:newRound,
    setStage:setStage, basisChange:basisChange, close:closeSheet, proposalPdf:proposalPdf, proposalDocx:proposalDocx, copyProposal:copyProposal,
    proposalTemplateDl:proposalTemplateDl, clearLetterhead:clearLetterhead,
    shareDeal:shareDeal, toggleProposalVisible:toggleProposalVisible,
    attachDoc:attachDoc, attachLeaseDoc:attachLeaseDoc, downloadDoc:downloadDoc, deleteDoc:deleteDoc, toggleDocVisible:toggleDocVisible,
    aiDraft:aiDraft, aiPickTmpl:aiPickTmpl, aiDocx:aiDocx, toggleVoice:toggleVoice, editRound:editRound,
    newTourStop:newTourStop, editTourStop:editTourStop, toggleTourVisible:toggleTourVisible, tourPropChange:tourPropChange,
    editAbstract:editAbstract, addKeyDate:addKeyDate, toggleAbstractVisible:toggleAbstractVisible,
    effectiveRent:effectiveRent, grossEquiv:grossEquiv
  };
})();

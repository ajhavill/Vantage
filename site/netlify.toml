# Netlify config for Vantage.
# The static site is the contents of public/. The commute API is a serverless
# function in netlify/functions/. The Google API key is provided at runtime via
# the GOOGLE_ROUTES_KEY environment variable (Site settings → Environment
# variables) — it is NEVER stored in these files or in the published site.
[build]
  publish = "public"

[build.environment]
  # Node 22 ships a native global WebSocket, which @supabase/supabase-js needs at
  # client init (Node 20 throws "no native WebSocket support"). 22 is current LTS.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
